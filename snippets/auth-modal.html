<!-- Auth Modal: Ingresar / Registrarse — Usuarios Públicos -->
<div class="modal-overlay" id="auth-modal" role="dialog" aria-modal="true" aria-labelledby="auth-modal-title">
    <div class="auth-modal-container">

        <!-- Close button -->
        <button type="button" class="auth-modal-close" id="authModalClose" aria-label="Cerrar">
            <i data-lucide="x"></i>
        </button>

        <!-- Brand header -->
        <div class="auth-modal-brand">
            <img src="multimedia/logo-placeholder.png" alt="Altorra Cars" class="auth-brand-logo">
            <p class="auth-brand-tagline">Tu próximo vehículo te espera</p>
        </div>

        <!-- Tab switcher -->
        <div class="auth-tabs" role="tablist">
            <button class="auth-tab active" id="tabLogin" role="tab" aria-selected="true" aria-controls="panelLogin" data-tab="login">
                <i data-lucide="log-in"></i>
                Ingresar
            </button>
            <button class="auth-tab" id="tabRegister" role="tab" aria-selected="false" aria-controls="panelRegister" data-tab="register">
                <i data-lucide="user-plus"></i>
                Registrarse
            </button>
        </div>

        <!-- ── PANEL LOGIN ── -->
        <div class="auth-panel active" id="panelLogin" role="tabpanel" aria-labelledby="tabLogin">
            <form id="authLoginForm" novalidate autocomplete="on">

                <div class="auth-form-group">
                    <label class="auth-label" for="loginEmail">
                        <i data-lucide="mail"></i>
                        Correo electrónico
                    </label>
                    <input type="email" id="loginEmail" class="auth-input" placeholder="tu@correo.com"
                           autocomplete="email" inputmode="email" required>
                </div>

                <div class="auth-form-group">
                    <label class="auth-label" for="loginPassword">
                        <i data-lucide="lock"></i>
                        Contraseña
                    </label>
                    <div class="auth-input-wrapper">
                        <input type="password" id="loginPassword" class="auth-input" placeholder="Tu contraseña"
                               autocomplete="current-password" required>
                        <button type="button" class="auth-toggle-pass" id="loginTogglePass" aria-label="Mostrar contraseña">
                            <i data-lucide="eye"></i>
                        </button>
                    </div>
                </div>

                <div class="auth-forgot-row">
                    <a href="#" id="authForgotLink" class="auth-forgot-link">¿Olvidaste tu contraseña?</a>
                </div>

                <div class="auth-message" id="loginMessage" role="alert" aria-live="polite"></div>

                <button type="submit" class="auth-submit-btn" id="loginSubmitBtn">
                    <i data-lucide="log-in"></i>
                    <span>Ingresar</span>
                </button>

                <div class="auth-divider"><span>o</span></div>

                <button type="button" class="auth-google-btn" id="loginGoogleBtn">
                    <svg width="18" height="18" viewBox="0 0 24 24" aria-hidden="true">
                        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                    </svg>
                    Continuar con Google
                </button>

                <p class="auth-switch-text">
                    ¿No tienes cuenta?
                    <a href="#" class="auth-switch-link" data-switch-to="register">Regístrate gratis</a>
                </p>

            </form>
        </div>

        <!-- ── PANEL REGISTRO ── -->
        <div class="auth-panel" id="panelRegister" role="tabpanel" aria-labelledby="tabRegister">
            <form id="authRegisterForm" novalidate autocomplete="on">

                <div class="auth-form-group">
                    <label class="auth-label" for="regNombre">
                        <i data-lucide="user"></i>
                        Nombre completo
                    </label>
                    <input type="text" id="regNombre" class="auth-input" placeholder="Ej: Carlos Pérez"
                           autocomplete="name" required>
                </div>

                <div class="auth-form-group">
                    <label class="auth-label" for="regEmail">
                        <i data-lucide="mail"></i>
                        Correo electrónico
                    </label>
                    <input type="email" id="regEmail" class="auth-input" placeholder="tu@correo.com"
                           autocomplete="email" inputmode="email" required>
                </div>

                <div class="auth-form-row">
                    <div class="auth-form-group" style="flex:0 0 110px">
                        <label class="auth-label" for="regPrefijo">País</label>
                        <select id="regPrefijo" class="auth-input" autocomplete="tel-country-code">
                            <option value="+57">🇨🇴 +57</option>
                            <option value="+58">🇻🇪 +58</option>
                            <option value="+593">🇪🇨 +593</option>
                            <option value="+507">🇵🇦 +507</option>
                            <option value="+52">🇲🇽 +52</option>
                            <option value="+1">🇺🇸 +1</option>
                            <option value="+51">🇵🇪 +51</option>
                            <option value="+56">🇨🇱 +56</option>
                            <option value="+54">🇦🇷 +54</option>
                            <option value="+34">🇪🇸 +34</option>
                        </select>
                    </div>
                    <div class="auth-form-group" style="flex:1">
                        <label class="auth-label" for="regTelefono">
                            <i data-lucide="phone"></i>
                            Teléfono <span class="auth-optional">(opcional)</span>
                        </label>
                        <input type="tel" id="regTelefono" class="auth-input" placeholder="3001234567"
                               autocomplete="tel-national" inputmode="tel">
                    </div>
                </div>

                <div class="auth-form-group">
                    <label class="auth-label" for="regPassword">
                        <i data-lucide="lock"></i>
                        Contraseña
                    </label>
                    <div class="auth-input-wrapper">
                        <input type="password" id="regPassword" class="auth-input" placeholder="Mínimo 6 caracteres"
                               autocomplete="new-password" minlength="6" required>
                        <button type="button" class="auth-toggle-pass" id="regTogglePass" aria-label="Mostrar contraseña">
                            <i data-lucide="eye"></i>
                        </button>
                    </div>
                    <div class="auth-password-strength" id="passStrengthBar" aria-hidden="true">
                        <div class="auth-strength-fill" id="passStrengthFill"></div>
                    </div>
                    <span class="auth-strength-label" id="passStrengthLabel"></span>
                </div>

                <div class="auth-form-group">
                    <label class="auth-label" for="regConfirm">
                        <i data-lucide="lock-keyhole"></i>
                        Confirmar contraseña
                    </label>
                    <div class="auth-input-wrapper">
                        <input type="password" id="regConfirm" class="auth-input" placeholder="Repite tu contraseña"
                               autocomplete="new-password" required>
                        <button type="button" class="auth-toggle-pass" id="confirmTogglePass" aria-label="Mostrar contraseña">
                            <i data-lucide="eye"></i>
                        </button>
                    </div>
                </div>

                <div class="auth-terms-row">
                    <label class="auth-check-label">
                        <input type="checkbox" id="regTerms" required>
                        <span class="auth-check-custom"></span>
                        <span>Acepto los <a href="terminos.html" target="_blank" rel="noopener">términos y condiciones</a> y la <a href="privacidad.html" target="_blank" rel="noopener">política de privacidad</a></span>
                    </label>
                </div>

                <div class="auth-message" id="registerMessage" role="alert" aria-live="polite"></div>

                <button type="submit" class="auth-submit-btn" id="registerSubmitBtn">
                    <i data-lucide="user-check"></i>
                    <span>Crear mi cuenta</span>
                </button>

                <div class="auth-divider"><span>o</span></div>

                <button type="button" class="auth-google-btn" id="registerGoogleBtn">
                    <svg width="18" height="18" viewBox="0 0 24 24" aria-hidden="true">
                        <path fill="#4285F4" d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z"/>
                        <path fill="#34A853" d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z"/>
                        <path fill="#FBBC05" d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z"/>
                        <path fill="#EA4335" d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z"/>
                    </svg>
                    Registrarse con Google
                </button>

                <p class="auth-switch-text">
                    ¿Ya tienes cuenta?
                    <a href="#" class="auth-switch-link" data-switch-to="login">Ingresa aquí</a>
                </p>

            </form>
        </div>

        <!-- ── PANEL RESET PASSWORD ── -->
        <div class="auth-panel" id="panelReset" role="tabpanel">
            <div class="auth-reset-header">
                <button type="button" class="auth-back-btn" id="authBackFromReset">
                    <i data-lucide="arrow-left"></i>
                    Volver
                </button>
                <h3 class="auth-reset-title">Recuperar contraseña</h3>
                <p class="auth-reset-hint">Te enviaremos un enlace para restablecer tu contraseña.</p>
            </div>
            <form id="authResetForm" novalidate>
                <div class="auth-form-group">
                    <label class="auth-label" for="resetEmail">
                        <i data-lucide="mail"></i>
                        Correo electrónico
                    </label>
                    <input type="email" id="resetEmail" class="auth-input" placeholder="tu@correo.com"
                           autocomplete="email" inputmode="email" required>
                </div>
                <div class="auth-message" id="resetMessage" role="alert" aria-live="polite"></div>
                <button type="submit" class="auth-submit-btn" id="resetSubmitBtn">
                    <i data-lucide="send"></i>
                    <span>Enviar enlace</span>
                </button>
            </form>
        </div>

    </div>
</div>
