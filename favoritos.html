<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="/multimedia/logo-placeholder.png">
    <link rel="apple-touch-icon" href="/multimedia/logo-placeholder.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Favoritos | ALTORRA CARS</title>
    <link rel="canonical" href="https://altorracars.github.io/favoritos.html">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/mobile-fixes.css">
    <link rel="stylesheet" href="css/vehicles-cards-fix.css">
    <link rel="stylesheet" href="css/sidebar-filters-fix.css">
    <link rel="stylesheet" href="css/footer-fixes.css">
    <link rel="stylesheet" href="css/toast-notifications.css">
    <link rel="stylesheet" href="css/comparador.css">
    <link rel="stylesheet" href="css/favorites-page.css">
    <link rel="stylesheet" href="css/favorites-empty-fullpage.css">
    <link rel="stylesheet" href="css/dark-theme.css">
    <link rel="stylesheet" href="css/performance-fixes.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
    <!-- Page Loader — Critical Inline CSS (cross-browser) -->
    <style>
    #page-loader{position:fixed;top:0;left:0;right:0;bottom:0;background:#0d0d0d;z-index:99999;display:-webkit-box;display:-webkit-flex;display:-ms-flexbox;display:flex;-webkit-box-align:center;-webkit-align-items:center;-ms-flex-align:center;align-items:center;-webkit-box-pack:center;-webkit-justify-content:center;-ms-flex-pack:center;justify-content:center;-webkit-box-orient:vertical;-webkit-box-direction:normal;-webkit-flex-direction:column;-ms-flex-direction:column;flex-direction:column;gap:24px;-webkit-transition:opacity .5s cubic-bezier(.4,0,.2,1),visibility .5s cubic-bezier(.4,0,.2,1);transition:opacity .5s cubic-bezier(.4,0,.2,1),visibility .5s cubic-bezier(.4,0,.2,1);}
    #page-loader.pl-done{opacity:0;visibility:hidden;pointer-events:none;}
    .pl-logo{width:68px;height:68px;-o-object-fit:contain;object-fit:contain;-webkit-animation:plPulse 2s ease-in-out infinite;animation:plPulse 2s ease-in-out infinite;}
    .pl-ring{width:48px;height:48px;border:3px solid rgba(184,150,88,.18);border-top-color:#b89658;border-radius:50%;-webkit-animation:plSpin .8s linear infinite;animation:plSpin .8s linear infinite;}
    @-webkit-keyframes plPulse{0%,100%{opacity:1;-webkit-transform:scale(1);transform:scale(1)}50%{opacity:.6;-webkit-transform:scale(.93);transform:scale(.93)}}
    @keyframes plPulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.6;transform:scale(.93)}}
    @-webkit-keyframes plSpin{to{-webkit-transform:rotate(360deg);transform:rotate(360deg)}}
    @keyframes plSpin{to{transform:rotate(360deg)}}
    </style>
    <link rel="stylesheet" href="css/page-loader.css">
</head>
<body>
    <!-- Page Loader -->
    <div id="page-loader" role="status" aria-label="Cargando ALTORRA CARS">
        <img src="/multimedia/logo-placeholder.png" class="pl-logo" alt="ALTORRA CARS" width="68" height="68" onerror="this.style.display='none'">
        <div class="pl-ring" aria-hidden="true"></div>
    </div>

    <div id="header-placeholder"></div>
    <!-- Header solo visible cuando hay favoritos -->
    <section class="page-header" id="favoritesHeader" style="display: none;">
        <div class="container">
            <div class="favorites-header-content">
                <div>
                    <h1 class="page-title">Mis Favoritos</h1>
                    <p class="page-subtitle">Vehículos que has guardado (<span id="favoritesCount">0</span>)</p>
                </div>
                <button id="clearAllBtn" class="btn-clear-all" style="display: none;">
                    🗑️ Eliminar todos
                </button>
            </div>
        </div>
    </section>
    <section class="favorites-section">
        <div class="container">
            <div class="vehicles-grid" id="favoritesGrid">
                <!-- Vehicles will be loaded here -->
            </div>
        </div>
    </section>
    <div id="footer-placeholder"></div>
    <script src="js/firebase-config.js" defer></script>
    <script src="js/favorites-manager.js" defer></script>
    <script src="js/toast.js" defer></script>
    <script src="js/components.js" defer></script>
    <script src="js/database.js" defer></script>
    <script src="js/render.js" defer></script>
    <script src="js/main.js" defer></script>
    <script src="js/comparador.js" defer></script>
    <script>
        // ════════════════════════════════════════════════════════════
        // FAVORITES PAGE — localStorage-first + diff-based rendering
        //
        // Strategy: zero perceived load time. Show cached data instantly
        // from localStorage, then silently sync with Firestore. If Firestore
        // returns the same data → user sees nothing. If different → animate
        // only the changed cards (diff-based update).
        // ════════════════════════════════════════════════════════════

        const FavPage = {
            renderedIds: [],
            firstRenderDone: false,
            firestoreSynced: false,

            init() {
                this.bindEvents();
                this.tryRender();
                // Safety: if still skeleton after 5s with no auth resolved
                setTimeout(() => {
                    if (!this.firstRenderDone) { this.tryRender(true); }
                }, 5000);
            },

            bindEvents() {
                window.addEventListener('favoritesChanged', (e) => {
                    if (!e.detail) return;
                    const action = e.detail.action;
                    if (action === 'cached') {
                        this.tryRender();
                    } else if (action === 'synced') {
                        this.firestoreSynced = true;
                        // Only re-render if data changed or first render hasn't happened
                        if (!this.firstRenderDone || e.detail.changed) {
                            this.tryRender();
                        }
                    } else if (action === 'added' || action === 'removed' || action === 'cleared') {
                        this.tryRender();
                    }
                });

                const clearBtn = document.getElementById('clearAllBtn');
                if (clearBtn) clearBtn.addEventListener('click', () => this.clearAll());
            },

            getEffectiveFavorites() {
                const fm = window.favoritesManager;
                if (!fm) return null;
                if (fm._uid && fm._loaded) return fm.getAll();
                // No user yet — auth might be initializing; defer
                if (!fm._uid && (!window.auth || window.auth.currentUser === undefined)) return null;
                // No user, auth resolved → empty
                if (!fm._uid) return [];
                return null;
            },

            showSkeleton() {
                const container = document.getElementById('favoritesGrid');
                const header = document.getElementById('favoritesHeader');
                if (header) header.style.display = 'none';
                if (!container) return;
                container.innerHTML =
                    '<div class="fav-skeleton-grid" style="grid-column:1/-1;display:grid;grid-template-columns:repeat(auto-fill,minmax(280px,1fr));gap:24px;width:100%;">' +
                    Array(3).fill(0).map(() =>
                        '<div class="fav-skeleton-card" style="height:380px;background:linear-gradient(110deg,#1a1a1a 30%,#222 50%,#1a1a1a 70%);background-size:200% 100%;animation:favShimmer 1.5s linear infinite;border-radius:12px;"></div>'
                    ).join('') +
                    '</div>' +
                    '<style>@keyframes favShimmer{0%{background-position:200% 0}100%{background-position:-200% 0}}</style>';
            },

            showEmpty(message, subtitle) {
                const container = document.getElementById('favoritesGrid');
                const header = document.getElementById('favoritesHeader');
                if (header) header.style.display = 'none';
                if (!container) return;
                container.innerHTML = `
                    <div class="no-favorites">
                        <div class="no-favorites-icon">♡</div>
                        <h2>${message}</h2>
                        <p>${subtitle}</p>
                        <div class="no-favorites-actions">
                            <a href="busqueda.html" class="btn-catalog btn-catalog-primary">Ver Todos los Autos</a>
                        </div>
                    </div>`;
                this.renderedIds = [];
            },

            async tryRender(forceEmpty = false) {
                const favorites = forceEmpty ? [] : this.getEffectiveFavorites();
                if (favorites === null) {
                    if (!this.firstRenderDone) this.showSkeleton();
                    return;
                }

                const container = document.getElementById('favoritesGrid');
                const countSpan = document.getElementById('favoritesCount');
                const clearBtn = document.getElementById('clearAllBtn');
                const header = document.getElementById('favoritesHeader');

                if (countSpan) countSpan.textContent = favorites.length;

                if (favorites.length === 0) {
                    if (header) header.style.display = 'none';
                    if (clearBtn) clearBtn.style.display = 'none';
                    this.showEmpty('No tienes favoritos aún', 'Explora nuestro catálogo y guarda los autos que te interesen');
                    this.firstRenderDone = true;
                    return;
                }

                if (header) header.style.display = 'block';
                if (clearBtn) clearBtn.style.display = 'block';

                // Ensure vehicleDB is loaded (it has its own localStorage cache → instant on second visit)
                if (typeof vehicleDB !== 'undefined' && !vehicleDB.loaded) {
                    await vehicleDB.load();
                }

                const favoriteVehicles = favorites
                    .map(id => vehicleDB.getVehicleById(String(id)))
                    .filter(v => v !== undefined && v !== null);

                if (favoriteVehicles.length === 0) {
                    this.showEmpty('No se encontraron vehículos', 'Los vehículos guardados ya no están disponibles');
                    this.firstRenderDone = true;
                    return;
                }

                this.renderDiff(favoriteVehicles);
                this.firstRenderDone = true;
            },

            // Diff-based render: only adds/removes cards that changed.
            // Avoids the jarring full re-render flash when Firestore confirms
            // the same data the cache already had.
            renderDiff(vehicles) {
                const container = document.getElementById('favoritesGrid');
                if (!container) return;
                const newIds = vehicles.map(v => String(v.id));
                const oldIds = this.renderedIds.slice();

                // First render or full mismatch (e.g. came from skeleton/empty state)
                const isFirst = !this.firstRenderDone || container.querySelector('.fav-skeleton-grid, .no-favorites');
                if (isFirst) {
                    container.innerHTML = '';
                    renderVehicles(vehicles, 'favoritesGrid', { attachListeners: false });
                    this.attachListeners();
                    this.renderedIds = newIds;
                    container.classList.add('fav-fade-in');
                    setTimeout(() => container.classList.remove('fav-fade-in'), 400);
                    return;
                }

                // Remove cards that are no longer in favorites (with animation)
                const toRemove = oldIds.filter(id => newIds.indexOf(id) === -1);
                toRemove.forEach(id => {
                    const card = container.querySelector('.vehicle-card[data-id="' + id + '"]');
                    if (card) {
                        card.style.transition = 'all 0.3s ease';
                        card.style.opacity = '0';
                        card.style.transform = 'scale(0.9)';
                        setTimeout(() => { if (card.parentNode) card.parentNode.removeChild(card); }, 300);
                    }
                });

                // Add new cards that weren't there before
                const toAdd = newIds.filter(id => oldIds.indexOf(id) === -1);
                if (toAdd.length > 0) {
                    const newVehicles = vehicles.filter(v => toAdd.indexOf(String(v.id)) !== -1);
                    // Render to a hidden container, then move nodes
                    const tempContainer = document.createElement('div');
                    tempContainer.id = '__fav_temp__';
                    tempContainer.style.display = 'none';
                    document.body.appendChild(tempContainer);
                    renderVehicles(newVehicles, '__fav_temp__', { attachListeners: false });
                    while (tempContainer.firstChild) {
                        const node = tempContainer.firstChild;
                        node.style.opacity = '0';
                        node.style.transform = 'scale(0.95)';
                        node.style.transition = 'all 0.3s ease';
                        container.appendChild(node);
                        requestAnimationFrame(() => {
                            node.style.opacity = '1';
                            node.style.transform = 'scale(1)';
                        });
                    }
                    document.body.removeChild(tempContainer);
                    this.attachListeners();
                }

                this.renderedIds = newIds;
            },

            attachListeners() {
                const buttons = document.querySelectorAll('.favorite-btn');
                buttons.forEach(button => {
                    if (button._favBound) return;
                    button._favBound = true;
                    button.addEventListener('click', (e) => this.handleRemove(e, button));
                });
            },

            async handleRemove(e, button) {
                e.preventDefault();
                e.stopPropagation();
                const vehicleId = button.getAttribute('data-id');
                if (!window.favoritesManager) return;

                const v = vehicleDB.getVehicleById(String(vehicleId));
                const vehName = v ? `${v.marca} ${v.modelo} ${v.year}` : 'Vehículo';

                window.favoritesManager.remove(vehicleId);
                // tryRender() will run via favoritesChanged event with diff animation

                const count = window.favoritesManager.count();
                if (window.notify) {
                    if (window._lastFavToastId) window.notify.dismiss(window._lastFavToastId, true);
                    window._lastFavToastId = window.notify.info({
                        title: 'Quitado de favoritos',
                        message: `${vehName} · ${count} ${count === 1 ? 'guardado' : 'guardados'}`
                    });
                }
            },

            clearAll() {
                if (this.renderedIds.length === 0) return;
                if (!confirm(`¿Estás seguro de eliminar todos los ${this.renderedIds.length} favoritos?`)) return;
                const cards = document.querySelectorAll('.vehicle-card');
                cards.forEach((card, i) => {
                    setTimeout(() => {
                        card.style.transition = 'all 0.3s ease';
                        card.style.opacity = '0';
                        card.style.transform = 'scale(0.9)';
                    }, i * 40);
                });
                setTimeout(() => {
                    if (window.favoritesManager) window.favoritesManager.clear();
                    if (window.notify) {
                        window.notify.success({ title: '¡Listo!', message: 'Todos los favoritos han sido eliminados.' });
                    }
                }, cards.length * 40 + 300);
            }
        };

        document.addEventListener('DOMContentLoaded', () => FavPage.init());
    </script>
    <style>
        .fav-fade-in { animation: favFadeIn 0.4s ease-out; }
        @keyframes favFadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>

        <script src="js/page-loader.js"></script>
    <!-- Cache Manager -->
    <script src="js/cache-manager.js" defer></script>
</body>
</html>
