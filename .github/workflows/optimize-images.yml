# Auto-optimize images: generate AVIF + WebP variants when new hero
# images are added or modified. Runs `scripts/optimize-images.mjs`,
# which is idempotent — only processes images whose output is missing
# or older than the source.
#
# Triggers:
# 1. Push to main with changes to hero/category images
# 2. Manual dispatch from GitHub UI (workflow_dispatch)
#
# Path filter: only runs if the commit touches the source images
# directories or the optimizer script itself. Bot commits to
# multimedia/optimized/ are intentionally NOT in `paths`, so this
# workflow never re-triggers itself (avoids infinite loops).

name: Optimize Images

on:
  push:
    branches: [main]
    paths:
      - 'multimedia/heroes/**.jpg'
      - 'multimedia/heroes/**.jpeg'
      - 'multimedia/heroes/**.png'
      - 'multimedia/heroes/**.webp'
      - 'multimedia/categories/**.jpg'
      - 'multimedia/categories/**.jpeg'
      - 'multimedia/categories/**.png'
      - 'multimedia/categories/**.webp'
      - 'multimedia/heroindex.*'
      - 'multimedia/marcas-hero.*'
      - 'multimedia/nosotros-hero.*'
      - 'scripts/optimize-images.mjs'
  workflow_dispatch:

jobs:
  optimize:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          # Need full history so we can commit + push
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install sharp
        run: npm install --no-save sharp

      - name: Run image optimizer
        run: node scripts/optimize-images.mjs

      - name: Check for changes
        id: check
        run: |
          if [ -n "$(git status --porcelain multimedia/optimized/)" ]; then
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Changes detected in multimedia/optimized/"
          else
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "No changes — all images already optimized"
          fi

      - name: Commit and push optimized images
        if: steps.check.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add multimedia/optimized/
          git commit -m "chore: auto-optimize images [skip ci]

          Generated AVIF + WebP variants for hero/category images.
          Triggered by changes to source images.

          https://github.com/altorracars/altorracars.github.io/actions"
          git push
