<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Altorra Cars — UI Kit</title>
<link rel="icon" href="../../assets/logo.png">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: 'Poppins', sans-serif; background: #0a0a0a; color: #fff; overflow-x: hidden; }
  input, button, select, textarea { font-family: 'Poppins', sans-serif; }
  a { text-decoration: none; color: inherit; }
  img { max-width: 100%; }

  @keyframes goldShimmer { 0%,100%{background-position:0% center} 50%{background-position:200% center} }
  @keyframes dotpulse { 0%,100%{opacity:1;transform:scale(1);box-shadow:0 0 7px rgba(212,175,55,0.9)} 50%{opacity:.4;transform:scale(.65);box-shadow:0 0 2px rgba(212,175,55,.3)} }
  @keyframes wapulse { 0%,100%{box-shadow:0 8px 30px rgba(212,175,55,.4),0 0 0 0 rgba(212,175,55,.7)} 50%{box-shadow:0 8px 30px rgba(212,175,55,.4),0 0 0 10px rgba(212,175,55,0)} }
  @keyframes fadein { from{opacity:0;transform:translateY(20px)} to{opacity:1;transform:none} }

  #root { min-height: 100vh; }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 6px; }
  ::-webkit-scrollbar-track { background: #111; }
  ::-webkit-scrollbar-thumb { background: rgba(184,150,88,0.4); border-radius: 3px; }

  /* Range input */
  input[type=range] { -webkit-appearance: none; height: 4px; background: rgba(255,255,255,0.1); border-radius: 2px; outline: none; }
  input[type=range]::-webkit-slider-thumb { -webkit-appearance: none; width: 16px; height: 16px; background: #d4af37; border-radius: 50%; cursor: pointer; }
</style>
</head>
<body>
<div id="root"></div>

<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

<script type="text/babel" src="Header.jsx"></script>
<script type="text/babel" src="Footer.jsx"></script>
<script type="text/babel" src="VehicleCard.jsx"></script>
<script type="text/babel" src="HomeScreen.jsx"></script>
<script type="text/babel" src="Screens.jsx"></script>

<script type="text/babel">
const { useState, useEffect } = React;

// ── Sample vehicle data ──────────────────────
const VEHICLES = [
  { id:1, title:'Chevrolet Equinox LS', year:'2018', km:'45.000 km', trans:'Automático', type:'SUV', badge:'USADO', badgeColor:'#3498db', price:'66.000.000', image:'../../assets/placeholder-car.jpg' },
  { id:2, title:'Toyota Hilux 4x4 SR', year:'2020', km:'62.000 km', trans:'Manual', type:'Pickup', badge:'NUEVO', badgeColor:'#38a28e', price:'119.000.000', originalPrice:'125.000.000', offer:true, image:'../../assets/placeholder-car.jpg' },
  { id:3, title:'Kia Sportage EX', year:'2021', km:'33.000 km', trans:'Automático', type:'SUV', badge:'NUEVO', badgeColor:'#38a28e', price:'98.500.000', image:'../../assets/placeholder-car.jpg' },
  { id:4, title:'Renault Sandero Stepway', year:'2019', km:'58.000 km', trans:'Manual', type:'Hatchback', badge:'USADO', badgeColor:'#3498db', price:'42.000.000', image:'../../assets/placeholder-car.jpg' },
  { id:5, title:'Mazda CX-5 Grand Touring', year:'2022', km:'18.000 km', trans:'Automático', type:'SUV', badge:'NUEVO', badgeColor:'#38a28e', price:'142.000.000', image:'../../assets/placeholder-car.jpg' },
  { id:6, title:'Nissan Frontier NP300', year:'2020', km:'40.000 km', trans:'Manual', type:'Pickup', badge:'USADO', badgeColor:'#3498db', price:'78.000.000', image:'../../assets/placeholder-car.jpg' },
  { id:7, title:'Hyundai Tucson GL', year:'2019', km:'52.000 km', trans:'Automático', type:'SUV', badge:'DESTACADO', badgeColor:'#d4af37', price:'72.000.000', image:'../../assets/placeholder-car.jpg' },
  { id:8, title:'Ford Escape SE', year:'2018', km:'67.000 km', trans:'Automático', type:'SUV', badge:'USADO', badgeColor:'#3498db', price:'59.000.000', image:'../../assets/placeholder-car.jpg' },
  { id:9, title:'Chevrolet Onix Plus LTZ', year:'2022', km:'14.000 km', trans:'Automático', type:'Sedán', badge:'NUEVO', badgeColor:'#38a28e', price:'62.000.000', image:'../../assets/placeholder-car.jpg' },
];

// ── App root ─────────────────────────────────
function App() {
  const [screen, setScreen] = useState(() => {
    try { return JSON.parse(sessionStorage.getItem('ac_screen') || '"home"'); } catch { return 'home'; }
  });
  const [selectedVehicle, setSelectedVehicle] = useState(null);

  function navigate(dest, vehicle = null) {
    if (vehicle) setSelectedVehicle(vehicle);
    setScreen(dest);
    sessionStorage.setItem('ac_screen', JSON.stringify(dest));
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  return (
    <div>
      <Header currentScreen={screen} onNavigate={navigate} favCount={3} />
      <main style={{ animation: 'fadein 0.4s ease' }} key={screen}>
        {screen === 'home'    && <HomeScreen   onNavigate={navigate} vehicles={VEHICLES} />}
        {screen === 'search'  && <SearchScreen onNavigate={navigate} vehicles={VEHICLES} />}
        {screen === 'detail'  && <DetailScreen vehicle={selectedVehicle || VEHICLES[0]} onNavigate={navigate} />}
        {screen === 'contact' && <ContactScreen onNavigate={navigate} />}
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
