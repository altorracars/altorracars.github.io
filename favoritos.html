    <style>
    #page-loader{position:fixed;top:0;left:0;right:0;bottom:0;background:#0d0d0d;z-index:99999;display:-webkit-box;display:-webkit-flex;display:-ms-flexbox;display:flex;-webkit-box-align:center;-webkit-align-items:center;-ms-flex-align:center;align-items:center;-webkit-box-pack:center;-webkit-justify-content:center;-ms-flex-pack:center;justify-content:center;-webkit-box-orient:vertical;-webkit-box-direction:normal;-webkit-flex-direction:column;-ms-flex-direction:column;flex-direction:column;gap:24px;-webkit-transition:opacity .5s cubic-bezier(.4,0,.2,1),visibility .5s cubic-bezier(.4,0,.2,1);transition:opacity .5s cubic-bezier(.4,0,.2,1),visibility .5s cubic-bezier(.4,0,.2,1);}

    <!-- Page Loader -->
    <div id="page-loader" role="status" aria-label="Cargando ALTORRA CARS">
        <img src="/multimedia/logo-placeholder.png" class="pl-logo" alt="ALTORRA CARS" width="68" height="68" onerror="this.style.display='none'">

    <script>
    // Hard safety net redundante: si por cualquier razon page-loader.js o
    // components.js no logran dismissarlo, multiples triggers garantizan que
    // el loader desaparezca. Inline aqui para registrarse ANTES de cualquier
    // script async/defer que pueda fallar o demorar.
    (function() {
        function killLoader() {
            var pl = document.getElementById('page-loader');
            if (!pl) return;
            if (pl.classList.contains('pl-done')) return;
            pl.classList.add('pl-done');
            setTimeout(function() {
                if (pl && pl.parentNode) pl.parentNode.removeChild(pl);
            }, 600);
        }
        // 1) Hard timeout 2.5s — sin importar nada mas, el loader se va
        setTimeout(killLoader, 2500);
        // 2) Cuando window.load dispara (todos los recursos cargados)
        if (document.readyState === 'complete') {
            setTimeout(killLoader, 200);
        } else {
            window.addEventListener('load', function() { setTimeout(killLoader, 200); });
        }
        // 3) Cuando DOMContentLoaded dispara (DOM parseado)
        if (document.readyState !== 'loading') {
            setTimeout(killLoader, 1500);
        } else {
            document.addEventListener('DOMContentLoaded', function() {
                setTimeout(killLoader, 1500);
            });
        }
    })();
    </script>

    <!-- Comparador — deferred to idle. Cards render fine without it
         (render.js uses defensive typeof check); user-triggered actions
         only fire after the script loads. -->
    <script>
    (function () {
        function loadComparador() {
            if (window._comparadorLoaded) return;
            window._comparadorLoaded = true;
            var s = document.createElement('script');
            s.src = 'js/comparador.js';
            s.async = false;
            document.body.appendChild(s);
        }
        if ('requestIdleCallback' in window) {
            requestIdleCallback(loadComparador, { timeout: 3000 });
        } else if (document.readyState === 'complete') {
            setTimeout(loadComparador, 1500);
        } else {
            window.addEventListener('load', function () {
                setTimeout(loadComparador, 1500);
            });
        }
    })();
    </script>
    <script>
        // ════════════════════════════════════════════════════════════
        // FAVORITES PAGE — localStorage-first + diff-based rendering
        //
        // Strategy: zero perceived load time. Show cached data instantly
        // from localStorage, then silently sync with Firestore. If Firestore
        // returns the same data → user sees nothing. If different → animate
        // only the changed cards (diff-based update).
        // ════════════════════════════════════════════════════════════

        const FavPage = {
            renderedIds: [],
            firstRenderDone: false,
            firestoreSynced: false,
            // 'pending' = auth still resolving | 'unauthenticated' | 'authenticated'
            _authState: 'pending',
            // Estado de UI: filtro de busqueda + orden seleccionado
            _filter: '',
            _sort: 'recent',
            // Cache del set completo de vehiculos para sort/filter sin tocar Firestore
            _allVehicles: [],

            init() {
                // Restaurar preferencia de orden si el usuario la guardo en visitas previas
                try {
                    var savedSort = localStorage.getItem('altorra_fav_sort');
                    if (savedSort) this._sort = savedSort;
                } catch (e) {}

                this.bindEvents();
                this.watchAuth();
                this.tryRender();
                // Safety: si auth no resuelve en 5s, asumimos unauthenticated
                setTimeout(() => {
                    if (this._authState === 'pending') {
                        this._authState = 'unauthenticated';
                        this.tryRender();
                    }
                }, 5000);
            },

            watchAuth() {
                const self = this;
                function setup() {
                    if (!window.auth || typeof window.auth.onAuthStateChanged !== 'function') {
                        setTimeout(setup, 50);
                        return;
                    }
                    // No unsubscribimos: queremos reaccionar a login/logout in-page
                    window.auth.onAuthStateChanged(function (user) {
                        const isAuth = !!(user && !user.isAnonymous);
                        const next = isAuth ? 'authenticated' : 'unauthenticated';
                        if (self._authState === next) return;
                        const prev = self._authState;
                        self._authState = next;
                        // Si la transicion es entre estados ya resueltos (ej: logout
                        // en otra tab mientras se ven favoritos cacheados), forzamos
                        // un render limpio para reflejar el nuevo estado
                        if (prev !== 'pending') {
                            self.renderedIds = [];
                            self.firstRenderDone = false;
                        }
                        self.tryRender();
                    });
                }
                setup();
            },

            bindEvents() {
                window.addEventListener('favoritesChanged', (e) => {
                    if (!e.detail) return;
                    const action = e.detail.action;
                    if (action === 'cached') {
                        this.tryRender();
                    } else if (action === 'synced') {
                        this.firestoreSynced = true;
                        // Only re-render if data changed or first render hasn't happened
                        if (!this.firstRenderDone || e.detail.changed) {
                            this.tryRender();
                        }
                    } else if (action === 'added' || action === 'removed' || action === 'cleared') {
                        this.tryRender();
                    }
                });

                const clearBtn = document.getElementById('clearAllBtn');
                if (clearBtn) clearBtn.addEventListener('click', () => this.clearAll());

                // ── Search ──────────────────────────────────────
                const searchInput = document.getElementById('favSearchInput');
                const searchClear = document.getElementById('favSearchClear');
                let searchTimer = null;
                if (searchInput) {
                    searchInput.addEventListener('input', (e) => {
                        const v = e.target.value || '';
                        if (searchClear) searchClear.style.display = v ? '' : 'none';
                        clearTimeout(searchTimer);
                        searchTimer = setTimeout(() => {
                            this._filter = v.trim().toLowerCase();
                            this.applyFilterAndRender();
                        }, 150);
                    });
                }
                if (searchClear) {
                    searchClear.addEventListener('click', () => {
                        if (searchInput) searchInput.value = '';
                        searchClear.style.display = 'none';
                        this._filter = '';
                        this.applyFilterAndRender();
                        if (searchInput) searchInput.focus();
                    });
                }

                // ── Sort ───────────────────────────────────────
                const sortSelect = document.getElementById('favSortSelect');
                if (sortSelect) {
                    // Aplicar valor restaurado de localStorage
                    sortSelect.value = this._sort;
                    sortSelect.addEventListener('change', (e) => {
                        this._sort = e.target.value;
                        try { localStorage.setItem('altorra_fav_sort', this._sort); } catch (err) {}
                        this.applyFilterAndRender();
                    });
                }

                // CTAs del estado "auth-required" (delegado para sobrevivir re-renders)
                document.addEventListener('click', (e) => {
                    const target = e.target.closest && e.target.closest('[data-fav-action]');
                    if (!target) return;
                    e.preventDefault();
                    const action = target.getAttribute('data-fav-action');
                    if (!window.AltorraAuth) return;
                    if (action === 'open-login') window.AltorraAuth.open('login');
                    else if (action === 'open-register') window.AltorraAuth.open('register');
                });
            },

            // ── Sort + Filter helpers ─────────────────────────
            applyFilter(vehicles) {
                if (!this._filter) return vehicles.slice();
                const q = this._filter;
                return vehicles.filter(v => {
                    const haystack = (
                        (v.marca || '') + ' ' +
                        (v.modelo || '') + ' ' +
                        (v.year || '') + ' ' +
                        (v.categoria || '') + ' ' +
                        (v.transmision || '')
                    ).toLowerCase();
                    return haystack.indexOf(q) !== -1;
                });
            },

            applySort(vehicles) {
                const arr = vehicles.slice();
                const priceOf = v => v.precioOferta || v.precio || 0;
                switch (this._sort) {
                    case 'oldest':
                        return arr; // orden de insercion original
                    case 'recent':
                        return arr.reverse(); // mas recientes primero (insertion reverse)
                    case 'price-asc':
                        return arr.sort((a, b) => priceOf(a) - priceOf(b));
                    case 'price-desc':
                        return arr.sort((a, b) => priceOf(b) - priceOf(a));
                    case 'year-desc':
                        return arr.sort((a, b) => (b.year || 0) - (a.year || 0));
                    case 'year-asc':
                        return arr.sort((a, b) => (a.year || 0) - (b.year || 0));
                    case 'brand':
                        return arr.sort((a, b) => (a.marca || '').localeCompare(b.marca || ''));
                    default:
                        return arr.reverse();
                }
            },

            applyFilterAndRender() {
                if (!this._allVehicles || this._allVehicles.length === 0) return;
                const filtered = this.applyFilter(this._allVehicles);
                const sorted = this.applySort(filtered);
                this.updateResultsInfo(filtered.length, this._allVehicles.length);
                if (sorted.length === 0) {
                    this.showFilteredEmpty();
                    return;
                }
                this.renderDiff(sorted);
            },

            updateResultsInfo(shown, total) {
                const el = document.getElementById('favResultsInfo');
                if (!el) return;
                if (this._filter && shown !== total) {
                    el.style.display = '';
                    el.textContent = 'Mostrando ' + shown + ' de ' + total + ' vehículos';
                } else {
                    el.style.display = 'none';
                }
            },

            showFilteredEmpty() {
                const container = document.getElementById('favoritesGrid');
                if (!container) return;
                container.innerHTML =
                    '<div class="fav-no-match">' +
                        '<div class="fav-no-match-icon"><i data-lucide="search-x"></i></div>' +
                        '<h3>Sin resultados</h3>' +
                        '<p>Ningún vehículo coincide con "<strong>' + this._escapeHtml(this._filter) + '</strong>".</p>' +
                        '<button type="button" class="fav-btn-outline" id="favClearFilterBtn">Limpiar busqueda</button>' +
                    '</div>';
                if (window.lucide && window.lucide.createIcons) window.lucide.createIcons();
                const btn = document.getElementById('favClearFilterBtn');
                if (btn) btn.addEventListener('click', () => {
                    const input = document.getElementById('favSearchInput');
                    const clear = document.getElementById('favSearchClear');
                    if (input) input.value = '';
                    if (clear) clear.style.display = 'none';
                    this._filter = '';
                    this.applyFilterAndRender();
                });
                this.renderedIds = [];
            },

            _escapeHtml(s) {
                return String(s).replace(/[&<>"']/g, function (c) {
                    return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
                });
            },

            updateStats(vehicles) {
                const elCount = document.getElementById('favStatCount');
                const elBrands = document.getElementById('favStatBrands');
                const elPrice = document.getElementById('favStatPrice');
                const count = vehicles.length;
                const brands = new Set(vehicles.map(v => (v.marca || '').toLowerCase()).filter(Boolean));
                const prices = vehicles.map(v => v.precioOferta || v.precio || 0).filter(p => p > 0);

                if (elCount) this._animateNumber(elCount, count);
                if (elBrands) this._animateNumber(elBrands, brands.size);

                if (elPrice) {
                    if (prices.length === 0) {
                        elPrice.textContent = '—';
                    } else if (prices.length === 1) {
                        elPrice.textContent = this._formatShortCOP(prices[0]);
                    } else {
                        const min = Math.min.apply(null, prices);
                        const max = Math.max.apply(null, prices);
                        if (min === max) {
                            elPrice.textContent = this._formatShortCOP(min);
                        } else {
                            elPrice.textContent = this._formatShortCOP(min) + ' – ' + this._formatShortCOP(max);
                        }
                    }
                }
            },

            _animateNumber(el, target) {
                const current = parseInt(el.textContent, 10) || 0;
                if (current === target) return;
                const diff = target - current;
                const steps = Math.min(20, Math.abs(diff));
                if (steps === 0) { el.textContent = String(target); return; }
                const stepDur = Math.max(15, Math.floor(400 / steps));
                let i = 0;
                clearInterval(el._animTimer);
                el._animTimer = setInterval(() => {
                    i++;
                    if (i >= steps) {
                        el.textContent = String(target);
                        clearInterval(el._animTimer);
                    } else {
                        el.textContent = String(Math.round(current + (diff * i / steps)));
                    }
                }, stepDur);
            },

            _formatShortCOP(n) {
                if (n >= 1e9) return '$' + (n / 1e9).toFixed(1).replace(/\.0$/, '') + ' MM';
                if (n >= 1e6) return '$' + Math.round(n / 1e6) + ' M';
                if (n >= 1e3) return '$' + Math.round(n / 1e3) + 'K';
                return '$' + n;
            },

            showHeroAndControls() {
                const hero = document.getElementById('favHero');
                const controls = document.getElementById('favControlsSection');
                const clearBtn = document.getElementById('clearAllBtn');
                if (hero) hero.style.display = '';
                if (controls) controls.style.display = '';
                if (clearBtn) clearBtn.style.display = '';
                if (window.lucide && window.lucide.createIcons) window.lucide.createIcons();
            },

            hideHeroAndControls() {
                const hero = document.getElementById('favHero');
                const controls = document.getElementById('favControlsSection');
                const clearBtn = document.getElementById('clearAllBtn');
                if (hero) hero.style.display = 'none';
                if (controls) controls.style.display = 'none';
                if (clearBtn) clearBtn.style.display = 'none';
            },

            getEffectiveFavorites() {
                const fm = window.favoritesManager;
                if (!fm) return null;
                if (fm._uid && fm._loaded) return fm.getAll();
                // Authenticated pero favoritesManager aun no tiene datos
                if (this._authState === 'authenticated') return null;
                return null;
            },

            showSkeleton() {
                const container = document.getElementById('favoritesGrid');
                this.hideHeroAndControls();
                if (!container) return;

                const cardHTML =
                    '<div class="fav-skeleton-card">' +
                        '<div class="fav-skel-image">' +
                            '<div class="fav-skel-badge"></div>' +
                            '<div class="fav-skel-heart"></div>' +
                        '</div>' +
                        '<div class="fav-skel-body">' +
                            '<div class="fav-skel-title"></div>' +
                            '<div class="fav-skel-subtitle"></div>' +
                            '<div class="fav-skel-meta-row">' +
                                '<div class="fav-skel-chip"></div>' +
                                '<div class="fav-skel-chip"></div>' +
                                '<div class="fav-skel-chip"></div>' +
                            '</div>' +
                            '<div class="fav-skel-divider"></div>' +
                            '<div class="fav-skel-price"></div>' +
                        '</div>' +
                    '</div>';

                // Numero de cards proporcional al viewport
                const w = window.innerWidth || 1024;
                const count = w < 480 ? 2 : w < 768 ? 3 : w < 1100 ? 4 : 6;

                container.innerHTML =
                    '<div class="fav-skeleton-wrapper" style="grid-column:1/-1;width:100%;">' +
                        '<div class="fav-skeleton-header">' +
                            '<div class="fav-skel-line fav-skel-line--title"></div>' +
                            '<div class="fav-skel-line fav-skel-line--subtitle"></div>' +
                        '</div>' +
                        '<div class="fav-skeleton-grid">' +
                            Array(count).fill(cardHTML).join('') +
                        '</div>' +
                    '</div>';
            },

            showAuthRequired() {
                const container = document.getElementById('favoritesGrid');
                this.hideHeroAndControls();
                if (!container) return;
                container.innerHTML =
                    '<div class="no-favorites no-favorites--auth">' +
                        '<div class="auth-gate-icon">' +
                            '<svg xmlns="http://www.w3.org/2000/svg" width="80" height="80" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">' +
                                '<rect x="3" y="11" width="18" height="11" rx="2" ry="2"></rect>' +
                                '<path d="M7 11V7a5 5 0 0 1 10 0v4"></path>' +
                                '<circle cx="12" cy="16" r="1.4"></circle>' +
                            '</svg>' +
                        '</div>' +
                        '<h2>Inicia sesión para ver tus favoritos</h2>' +
                        '<p>Tus favoritos se guardan en tu cuenta y los puedes ver desde cualquier dispositivo.</p>' +
                        '<div class="no-favorites-actions">' +
                            '<button type="button" class="btn-catalog btn-catalog-primary" data-fav-action="open-login">' +
                                'Iniciar sesión' +
                            '</button>' +
                            '<button type="button" class="btn-catalog btn-catalog-secondary" data-fav-action="open-register">' +
                                'Crear cuenta' +
                            '</button>' +
                        '</div>' +
                    '</div>';
                this.renderedIds = [];
                this.firstRenderDone = true;
            },

            showEmpty(message, subtitle) {
                const container = document.getElementById('favoritesGrid');
                this.hideHeroAndControls();
                if (!container) return;
                container.innerHTML = `
                    <div class="no-favorites">
                        <div class="no-favorites-icon">♡</div>
                        <h2>${message}</h2>
                        <p>${subtitle}</p>
                        <div class="no-favorites-actions">
                            <a href="busqueda.html" class="btn-catalog btn-catalog-primary">Ver Todos los Autos</a>
                        </div>
                    </div>`;
                this.renderedIds = [];
            },

            async tryRender(forceEmpty = false) {
                // 1) Si auth resuelta como NO autenticado → gate de login
                if (this._authState === 'unauthenticated') {
                    this.showAuthRequired();
                    return;
                }

                // 2) Si auth todavia esta resolviendo y no hay datos cacheados → skeleton
                const favorites = forceEmpty ? [] : this.getEffectiveFavorites();
                if (favorites === null) {
                    if (!this.firstRenderDone) this.showSkeleton();
                    return;
                }

                if (favorites.length === 0) {
                    this.hideHeroAndControls();
                    this.showEmpty('No tienes favoritos aún', 'Explora nuestro catálogo y guarda los autos que te interesen');
                    this._allVehicles = [];
                    this.firstRenderDone = true;
                    return;
                }

                // Ensure vehicleDB is loaded (it has its own localStorage cache → instant on second visit)
                if (typeof vehicleDB !== 'undefined' && !vehicleDB.loaded) {
                    await vehicleDB.load();
                }

                const favoriteVehicles = favorites
                    .map(id => vehicleDB.getVehicleById(String(id)))
                    .filter(v => v !== undefined && v !== null);

                if (favoriteVehicles.length === 0) {
                    this.hideHeroAndControls();
                    this.showEmpty('No se encontraron vehículos', 'Los vehículos guardados ya no están disponibles');
                    this._allVehicles = [];
                    this.firstRenderDone = true;
                    return;
                }

                // Cachear el conjunto completo para que sort/filter no toquen Firestore
                this._allVehicles = favoriteVehicles;

                // Hero stats siempre se actualizan con el TOTAL (sin filtrar)
                this.showHeroAndControls();
                this.updateStats(favoriteVehicles);

                // Aplicar filter + sort y renderizar
                const filtered = this.applyFilter(favoriteVehicles);
                const sorted = this.applySort(filtered);
                this.updateResultsInfo(filtered.length, favoriteVehicles.length);

                if (sorted.length === 0) {
                    this.showFilteredEmpty();
                    this.firstRenderDone = true;
                    return;
                }

                this.renderDiff(sorted);
                this.firstRenderDone = true;
            },

            // Diff-based render: only adds/removes cards that changed.
            // Avoids the jarring full re-render flash when Firestore confirms
            // the same data the cache already had.
            renderDiff(vehicles) {
                const container = document.getElementById('favoritesGrid');
                if (!container) return;
                const newIds = vehicles.map(v => String(v.id));
                const oldIds = this.renderedIds.slice();

                // First render or full mismatch (e.g. came from skeleton/empty/filtered-empty state)
                const isFirst = !this.firstRenderDone || container.querySelector('.fav-skeleton-grid, .no-favorites, .fav-no-match');
                if (isFirst) {
                    container.innerHTML = '';
                    renderVehicles(vehicles, 'favoritesGrid', { attachListeners: false });
                    this.attachListeners();
                    this.renderedIds = newIds;
                    container.classList.add('fav-fade-in');
                    setTimeout(() => container.classList.remove('fav-fade-in'), 400);
                    return;
                }

                // Remove cards that are no longer in favorites (with animation)
                const toRemove = oldIds.filter(id => newIds.indexOf(id) === -1);
                toRemove.forEach(id => {
                    const card = container.querySelector('.vehicle-card[data-id="' + id + '"]');
                    if (card) {
                        card.style.transition = 'all 0.3s ease';
                        card.style.opacity = '0';
                        card.style.transform = 'scale(0.9)';
                        setTimeout(() => { if (card.parentNode) card.parentNode.removeChild(card); }, 300);
                    }
                });

                // Add new cards that weren't there before
                const toAdd = newIds.filter(id => oldIds.indexOf(id) === -1);
                if (toAdd.length > 0) {
                    const newVehicles = vehicles.filter(v => toAdd.indexOf(String(v.id)) !== -1);
                    // Render to a hidden container, then move nodes
                    const tempContainer = document.createElement('div');
                    tempContainer.id = '__fav_temp__';
                    tempContainer.style.display = 'none';
                    document.body.appendChild(tempContainer);
                    renderVehicles(newVehicles, '__fav_temp__', { attachListeners: false });
                    while (tempContainer.firstChild) {
                        const node = tempContainer.firstChild;
                        node.style.opacity = '0';
                        node.style.transform = 'scale(0.95)';
                        node.style.transition = 'all 0.3s ease';
                        container.appendChild(node);
                        requestAnimationFrame(() => {
                            node.style.opacity = '1';
                            node.style.transform = 'scale(1)';
                        });
                    }
                    document.body.removeChild(tempContainer);
                    this.attachListeners();
                }

                this.renderedIds = newIds;
            },

            attachListeners() {
                const buttons = document.querySelectorAll('.favorite-btn');
                buttons.forEach(button => {
                    if (button._favBound) return;
                    button._favBound = true;
                    button.addEventListener('click', (e) => this.handleRemove(e, button));
                });
            },

            handleRemove(e, button) {
                e.preventDefault();
                e.stopPropagation();
                const vehicleId = button.getAttribute('data-id');
                if (!window.favoritesManager) return;
                // Centralized handler: toast with undo, multi-card sync, animation
                window.favoritesManager.handleHeartClick(button, vehicleId);
                // tryRender() runs via favoritesChanged event with diff animation
            },

            clearAll() {
                if (this.renderedIds.length === 0) return;
                const total = this.renderedIds.length;
                const self = this;

                if (!window.notify) {
                    if (!confirm(`¿Eliminar todos los ${total} favoritos?`)) return;
                    self._doClearAll();
                    return;
                }

                if (window._lastClearAllToastId) {
                    window.notify.dismiss(window._lastClearAllToastId, true);
                }
                window._lastClearAllToastId = window.notify.warning({
                    title: '¿Eliminar todos los favoritos?',
                    message: `${total} ${total === 1 ? 'vehículo' : 'vehículos'} serán removidos. Esta acción no se puede deshacer.`,
                    duration: 8000,
                    action: {
                        label: 'Sí, eliminar todos',
                        onClick: function () {
                            window._lastClearAllToastId = null;
                            self._doClearAll();
                        }
                    }
                });
            },

            _doClearAll() {
                const cards = document.querySelectorAll('.vehicle-card');
                cards.forEach((card, i) => {
                    setTimeout(() => {
                        card.style.transition = 'all 0.3s ease';
                        card.style.opacity = '0';
                        card.style.transform = 'scale(0.9)';
                    }, i * 40);
                });
                setTimeout(() => {
                    if (window.favoritesManager) window.favoritesManager.clear();
                    if (window.notify) {
                        window.notify.success({
                            title: '¡Listo!',
                            message: 'Todos los favoritos han sido eliminados.',
                            duration: 3000
                        });
                    }
                }, cards.length * 40 + 300);
            }
        };

        document.addEventListener('DOMContentLoaded', () => FavPage.init());
    </script>
    <style>
        .fav-fade-in { animation: favFadeIn 0.4s ease-out; }
        @keyframes favFadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>

        <script src="js/page-loader.js"></script>
    <!-- Cache Manager -->
    <script src="js/cache-manager.js" defer></script>
</body>
