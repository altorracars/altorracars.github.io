<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Poppins',sans-serif;background:#0a0a0a;padding:24px;display:flex;flex-direction:column;gap:12px;}
.title{color:#b89658;font-size:0.65rem;font-weight:700;letter-spacing:0.15em;text-transform:uppercase;opacity:0.6;}
.row{display:flex;gap:8px;}
.sw{flex:1;border-radius:8px;padding:14px 10px 10px;min-height:80px;display:flex;flex-direction:column;justify-content:flex-end;}
.sw-name{font-size:0.72rem;font-weight:600;margin-bottom:2px;}
.sw-hex{font-size:0.65rem;opacity:0.5;}
</style></head><body>
<div class="title">Dark Neutrals</div>
<div class="row">
  <div class="sw" style="background:#000000;border:1px solid #222;color:#fff;"><div class="sw-name">Pure Black</div><div class="sw-hex">#000000</div></div>
  <div class="sw" style="background:#0a0a0a;border:1px solid #222;color:#fff;"><div class="sw-name">Deep Black</div><div class="sw-hex">#0a0a0a</div></div>
  <div class="sw" style="background:#111111;border:1px solid #222;color:#fff;"><div class="sw-name">UI Black</div><div class="sw-hex">#111111</div></div>
  <div class="sw" style="background:#1a1a1a;color:#fff;"><div class="sw-name">Medium</div><div class="sw-hex">#1a1a1a</div></div>
  <div class="sw" style="background:#242424;color:#fff;"><div class="sw-name">Light</div><div class="sw-hex">#242424</div></div>
</div>
<div class="title" style="margin-top:4px;">Grays &amp; Light Backgrounds</div>
<div class="row">
  <div class="sw" style="background:#e8e8e8;color:#111;"><div class="sw-name">Gray Light</div><div class="sw-hex">#e8e8e8</div></div>
  <div class="sw" style="background:#b0b0b0;color:#111;"><div class="sw-name">Gray Medium</div><div class="sw-hex">#b0b0b0</div></div>
  <div class="sw" style="background:#9c9997;color:#fff;"><div class="sw-name">Gray Muted</div><div class="sw-hex">#9c9997</div></div>
  <div class="sw" style="background:#fafafa;color:#111;border:1px solid #e0e0e0;"><div class="sw-name">Light BG</div><div class="sw-hex">#fafafa</div></div>
  <div class="sw" style="background:#f0ebe3;color:#111;border:1px solid #e0d8cc;"><div class="sw-name">Warm BG</div><div class="sw-hex">#f0ebe3</div></div>
</div>
</body></html>
