    <!-- Page Loader — Critical Inline CSS -->
    <style>
    #page-loader{position:fixed;top:0;left:0;right:0;bottom:0;background:#0d0d0d;z-index:99999;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:24px;transition:opacity .5s cubic-bezier(.4,0,.2,1),visibility .5s cubic-bezier(.4,0,.2,1)}
    #page-loader.pl-done{opacity:0;visibility:hidden;pointer-events:none}
    .pl-logo{width:68px;height:68px;object-fit:contain;animation:plPulse 2s ease-in-out infinite}
    .pl-ring{width:48px;height:48px;border:3px solid rgba(184,150,88,.18);border-top-color:#b89658;border-radius:50%;animation:plSpin .8s linear infinite}
    @keyframes plPulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.6;transform:scale(.93)}}
    @keyframes plSpin{to{transform:rotate(360deg)}}
    </style>
    <link rel="stylesheet" href="css/page-loader.css">

    <!-- Page-specific styles -->
    <style>
    /* ── HERO — synced with brand-hero (same dimensions, overlays, animations) ── */
    .marcas-hero{position:relative;width:100%;min-height:clamp(480px,70vh,720px);display:flex;align-items:center;justify-content:center;overflow:hidden;margin-top:70px;isolation:isolate;z-index:10;animation:brandHeroFadeIn .9s cubic-bezier(.22,1,.36,1) both}
    .marcas-hero-bg{position:absolute;top:0;left:0;width:100%;height:100%;object-fit:cover;object-position:center 40%;filter:brightness(.85) saturate(1.05);animation:subtle-zoom 20s ease-in-out infinite alternate}
    .marcas-hero-overlay{position:absolute;inset:0;z-index:1;background:linear-gradient(to bottom,rgba(0,0,0,.78) 0%,rgba(0,0,0,.28) 38%,rgba(0,0,0,.30) 62%,rgba(0,0,0,.85) 100%)}

    /* Ambient lights — identical to index hero-ambient */
    .hero-ambient{position:absolute;inset:0;z-index:2;pointer-events:none;overflow:hidden}
    .hero-ambient::before,.hero-ambient::after{content:'';position:absolute;border-radius:50%;filter:blur(70px);animation:hero-orb-drift 16s ease-in-out infinite alternate}
    .hero-ambient::before{width:380px;height:380px;background:radial-gradient(circle,rgba(212,175,55,.045) 0%,transparent 65%);top:-220px;left:-180px}
    .hero-ambient::after{width:320px;height:320px;background:radial-gradient(circle,rgba(184,150,88,.035) 0%,transparent 65%);bottom:-180px;right:-150px;animation-delay:-8s;animation-direction:alternate-reverse}
    @keyframes hero-orb-drift{0%{transform:translate(0,0) scale(1)}50%{transform:translate(30px,20px) scale(1.08)}100%{transform:translate(-15px,-15px) scale(.96)}}

    /* Floating particles — identical to index */
    .hero-particles{position:absolute;inset:0;z-index:2;pointer-events:none;overflow:hidden}
    .hero-particle{position:absolute;width:3px;height:3px;border-radius:50%;background:rgba(212,175,55,.4);animation:particleFloat linear infinite}
    .hero-particle:nth-child(1){left:10%;top:80%;animation-duration:12s;animation-delay:0s}
    .hero-particle:nth-child(2){left:25%;top:90%;animation-duration:15s;animation-delay:2s;width:2px;height:2px}
    .hero-particle:nth-child(3){left:45%;top:85%;animation-duration:10s;animation-delay:4s}
    .hero-particle:nth-child(4){left:65%;top:95%;animation-duration:14s;animation-delay:1s;width:2px;height:2px}
    .hero-particle:nth-child(5){left:80%;top:88%;animation-duration:11s;animation-delay:3s}
    .hero-particle:nth-child(6){left:35%;top:92%;animation-duration:16s;animation-delay:5s;width:4px;height:4px;background:rgba(212,175,55,.2)}
    .hero-particle:nth-child(7){left:55%;top:78%;animation-duration:13s;animation-delay:6s}
    .hero-particle:nth-child(8){left:90%;top:82%;animation-duration:17s;animation-delay:2.5s;width:2px;height:2px}
    @keyframes particleFloat{0%{transform:translateY(0) scale(1);opacity:0}10%{opacity:1}90%{opacity:1}100%{transform:translateY(-85vh) scale(0);opacity:0}}

    /* Bottom fade */
    .hero-bottom-fade{position:absolute;bottom:0;left:0;right:0;height:140px;background:linear-gradient(to bottom,transparent 0%,#0a0a0a 100%);z-index:3;pointer-events:none}

    /* Hero content — synced with about-hero container */
    .marcas-hero-content{position:relative;z-index:4;text-align:center;max-width:680px;padding:2rem;animation:hero-content-in .9s cubic-bezier(.22,1,.36,1) both}
    @keyframes hero-content-in{from{opacity:0;transform:translateY(28px)}to{opacity:1;transform:translateY(0)}}

    /* Badge — synced with index hero-badge */
    .marcas-hero-badge{display:inline-flex;align-items:center;gap:.55rem;padding:.5rem 1.5rem;border:1px solid rgba(212,175,55,.38);border-radius:100px;background:rgba(212,175,55,.1);color:#d4af37;font-family:Poppins,sans-serif;font-size:.78rem;font-weight:500;letter-spacing:.04em;margin-bottom:1.2rem;animation:hero-content-in 1s cubic-bezier(.22,1,.36,1) .15s both}
    .marcas-hero-badge-dot{width:7px;height:7px;border-radius:50%;background:#d4af37;box-shadow:0 0 7px rgba(212,175,55,.9);animation:hero-dot-pulse 2s ease-in-out infinite}
    @keyframes hero-dot-pulse{0%,100%{opacity:1;transform:scale(1);box-shadow:0 0 7px rgba(212,175,55,.9)}50%{opacity:.4;transform:scale(.65);box-shadow:0 0 2px rgba(212,175,55,.3)}}

    .marcas-hero h1{font-family:Poppins,sans-serif;font-size:clamp(1.8rem,5vw,2.8rem);font-weight:700;color:#f8f8f8;margin:0 0 .5rem;letter-spacing:-.02em;animation:hero-content-in 1s cubic-bezier(.22,1,.36,1) .25s both}
    .marcas-hero h1 span{background:linear-gradient(135deg,#d4af37,#f0d060,#b89658);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text}
    .marcas-hero p{font-family:Poppins,sans-serif;font-size:clamp(.9rem,2vw,1.05rem);color:rgba(255,255,255,.55);font-weight:300;margin:0;line-height:1.6;animation:hero-content-in 1s cubic-bezier(.22,1,.36,1) .35s both}

    @keyframes brandHeroFadeIn{from{opacity:0}to{opacity:1}}
    @keyframes subtle-zoom{0%{transform:scale(1)}100%{transform:scale(1.06)}}

    /* ── SEARCH ───────────────────────────────────────────── */
    .marcas-search{max-width:460px;margin:28px auto 0;position:relative;animation:hero-content-in 1s cubic-bezier(.22,1,.36,1) .45s both}
    .marcas-search input{width:100%;padding:13px 48px 13px 18px;background:rgba(255,255,255,.06);border:1.5px solid rgba(212,175,55,.2);border-radius:12px;color:#e8e8e8;font-family:Poppins,sans-serif;font-size:.95rem;outline:none;transition:border-color .25s,box-shadow .25s;backdrop-filter:blur(8px)}
    .marcas-search input::placeholder{color:rgba(255,255,255,.3)}
    .marcas-search input:focus{border-color:#d4af37;box-shadow:0 0 0 3px rgba(212,175,55,.1)}
    .marcas-search svg{position:absolute;right:16px;top:50%;transform:translateY(-50%);color:rgba(212,175,55,.5);pointer-events:none}

    /* ── STATS BAR ────────────────────────────────────────── */
    .marcas-stats{display:flex;justify-content:center;gap:clamp(24px,5vw,56px);padding:20px 24px;background:#0d0d0d;border-bottom:1px solid rgba(255,255,255,.05)}
    .marcas-stat{text-align:center}
    .marcas-stat-num{font-family:Poppins,sans-serif;font-size:clamp(1.4rem,3vw,1.8rem);font-weight:700;background:linear-gradient(135deg,#d4af37,#f0d060);-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;display:block;line-height:1.2}
    .marcas-stat-label{font-family:Poppins,sans-serif;font-size:.72rem;color:rgba(255,255,255,.4);text-transform:uppercase;letter-spacing:.08em;margin-top:2px}

    /* ── GRID ─────────────────────────────────────────────── */
    .marcas-grid-section{background:#0a0a0a;padding:40px 24px 60px}
    .marcas-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(170px,1fr));gap:16px;max-width:1200px;margin:0 auto}

    /* ── BRAND CARD ───────────────────────────────────────── */
    .marca-card{position:relative;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:28px 16px 20px;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:16px;text-decoration:none;transition:transform .28s cubic-bezier(.34,1.56,.64,1),border-color .25s,box-shadow .25s,background .25s;overflow:hidden;cursor:pointer}
    .marca-card::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse at 50% 0%,rgba(212,175,55,.06) 0%,transparent 70%);opacity:0;transition:opacity .3s;pointer-events:none;border-radius:16px}
    .marca-card:hover{transform:translateY(-6px) scale(1.02);border-color:rgba(212,175,55,.35);box-shadow:0 12px 40px rgba(0,0,0,.4),0 0 0 1px rgba(212,175,55,.1);background:rgba(255,255,255,.05)}
    .marca-card:hover::before{opacity:1}
    .marca-card:active{transform:translateY(-2px) scale(.98)}

    .marca-card-logo{width:72px;height:52px;object-fit:contain;filter:brightness(.85) contrast(1.1);transition:filter .3s,transform .3s}
    .marca-card:hover .marca-card-logo{filter:brightness(1.1) contrast(1.05) drop-shadow(0 2px 8px rgba(212,175,55,.25));transform:scale(1.08)}

    .marca-card-name{font-family:Poppins,sans-serif;font-size:.85rem;font-weight:600;color:#e8e8e8;margin-top:12px;letter-spacing:.01em;transition:color .25s}
    .marca-card:hover .marca-card-name{color:#f0d060}

    .marca-card-count{font-family:Poppins,sans-serif;font-size:.7rem;color:rgba(255,255,255,.35);margin-top:4px;transition:color .25s}
    .marca-card:hover .marca-card-count{color:rgba(212,175,55,.6)}

    .marca-card-badge{position:absolute;top:10px;right:10px;background:linear-gradient(135deg,#d4af37,#b89658);color:#0a0a0a;font-family:Poppins,sans-serif;font-size:.6rem;font-weight:700;padding:3px 7px;border-radius:6px;opacity:0;transform:scale(.8);transition:opacity .25s,transform .25s}
    .marca-card:hover .marca-card-badge{opacity:1;transform:scale(1)}

    /* No results */
    .marcas-empty{text-align:center;padding:60px 24px;color:rgba(255,255,255,.4);font-family:Poppins,sans-serif}
    .marcas-empty svg{margin-bottom:16px;opacity:.3}
    .marcas-empty p{font-size:.95rem}

    /* ── SKELETON LOADER ─────────────────────────────────── */
    .marca-skel{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.04);border-radius:16px;padding:28px 16px 20px;display:flex;flex-direction:column;align-items:center;gap:10px}
    .skel-circle{width:52px;height:52px;border-radius:12px;background:linear-gradient(90deg,rgba(255,255,255,.04) 25%,rgba(255,255,255,.08) 50%,rgba(255,255,255,.04) 75%);background-size:200% 100%;animation:skelPulse 1.5s ease infinite}
    .skel-line{height:12px;border-radius:6px;background:linear-gradient(90deg,rgba(255,255,255,.04) 25%,rgba(255,255,255,.08) 50%,rgba(255,255,255,.04) 75%);background-size:200% 100%;animation:skelPulse 1.5s ease infinite}
    .skel-line--w60{width:60%}.skel-line--w40{width:40%}
    @keyframes skelPulse{0%{background-position:200% 0}100%{background-position:-200% 0}}

    /* ── RESPONSIVE ───────────────────────────────────────── */
    @media(max-width:768px){
        .marcas-hero{min-height:clamp(300px,42vh,420px)}
        .marcas-hero-bg{animation:none}
        .marcas-grid{grid-template-columns:repeat(auto-fill,minmax(145px,1fr));gap:12px}
        .marca-card{padding:22px 12px 16px}
        .marca-card-logo{width:60px;height:44px}
        .marcas-stats{gap:20px;padding:16px 20px}
        .hero-particle:nth-child(n+6){display:none}
    }
    @media(max-width:480px){
        .marcas-hero{min-height:clamp(220px,32vh,300px);margin-top:56px}
        .marcas-hero-bg{object-position:center 48%;filter:brightness(.75) saturate(1.05)}
        .marcas-grid{grid-template-columns:repeat(2,1fr);gap:10px}
        .marca-card{padding:20px 10px 14px;border-radius:12px}
        .marca-card-logo{width:52px;height:38px}
        .marca-card-name{font-size:.78rem}
    }
    </style>
</head>
<body>

    <!-- Stats -->

        </div>

            <span class="marcas-stat-num" id="statTypes">--</span>

        </div>
    </div>

    <!-- Grid -->
    <section class="marcas-grid-section">
        <div class="marcas-grid" id="marcasGrid">
            <!-- Skeletons while loading -->
            <div class="marca-skel"><div class="skel-circle"></div><div class="skel-line skel-line--w60"></div><div class="skel-line skel-line--w40"></div></div>
            <div class="marca-skel"><div class="skel-circle"></div><div class="skel-line skel-line--w60"></div><div class="skel-line skel-line--w40"></div></div>
            <div class="marca-skel"><div class="skel-circle"></div><div class="skel-line skel-line--w60"></div><div class="skel-line skel-line--w40"></div></div>
            <div class="marca-skel"><div class="skel-circle"></div><div class="skel-line skel-line--w60"></div><div class="skel-line skel-line--w40"></div></div>
            <div class="marca-skel"><div class="skel-circle"></div><div class="skel-line skel-line--w60"></div><div class="skel-line skel-line--w40"></div></div>
            <div class="marca-skel"><div class="skel-circle"></div><div class="skel-line skel-line--w60"></div><div class="skel-line skel-line--w40"></div></div>
        </div>

    <div id="footer-placeholder"></div>

    <!-- Firebase -->
    <script src="js/firebase-config.js"></script>
    <script src="js/favorites-manager.js" defer></script>
    <script src="js/toast.js" defer></script>
    <script src="js/components.js" defer></script>
    <script src="js/database.js" defer></script>
    <script src="js/page-loader.js" defer></script>
    <script src="js/performance.js" defer></script>

    <script>
    (function () {
        'use strict';

        var grid = document.getElementById('marcasGrid');
        var searchInput = document.getElementById('marcasSearchInput');
        var allCards = []; // { el, name }

        // Wait for vehicleDB
        function waitForDB(cb) {
            if (typeof vehicleDB !== 'undefined') {
                vehicleDB.load().then(cb).catch(cb);
            } else {
                var t = setInterval(function () {
                    if (typeof vehicleDB !== 'undefined') {
                        clearInterval(t);
                        vehicleDB.load().then(cb).catch(cb);
                    }
                }, 100);
                setTimeout(function () { clearInterval(t); cb(); }, 8000);
            }
        }

        function capitalize(s) {
            if (!s) return '';
            return s.charAt(0).toUpperCase() + s.slice(1);
        }

        function renderBrands() {
            var brands = (typeof vehicleDB !== 'undefined' && vehicleDB.getAllBrands)
                ? vehicleDB.getAllBrands() : [];
            var vehicles = (typeof vehicleDB !== 'undefined' && vehicleDB.getAllVehicles)
                ? vehicleDB.getAllVehicles() : [];

            // Count available vehicles per brand
            var countMap = {};
            var categorySet = new Set();
            var totalAvailable = 0;
            vehicles.forEach(function (v) {
                if ((v.estado === 'disponible' || !v.estado) && v.marca) {
                    var key = v.marca.toLowerCase();
                    countMap[key] = (countMap[key] || 0) + 1;
                    totalAvailable++;
                    if (v.categoria) categorySet.add(v.categoria);
                }
            });

            // Merge brands from DB + any brands found in vehicles
            var brandMap = {};
            brands.forEach(function (b) {
                brandMap[b.id || b.nombre.toLowerCase()] = b;
            });
            Object.keys(countMap).forEach(function (key) {
                if (!brandMap[key]) {
                    brandMap[key] = { id: key, nombre: capitalize(key), logo: 'multimedia/Logos/' + capitalize(key) + '.webp' };
                }
            });

            // Sort: brands with inventory first (desc), then alphabetical
            var sorted = Object.values(brandMap).sort(function (a, b) {
                var ca = countMap[(a.id || '').toLowerCase()] || 0;
                var cb = countMap[(b.id || '').toLowerCase()] || 0;
                if (cb !== ca) return cb - ca;
                return (a.nombre || '').localeCompare(b.nombre || '');
            });

            // Update stats
            document.getElementById('statBrands').textContent = sorted.length;
            document.getElementById('statVehicles').textContent = totalAvailable;
            document.getElementById('statTypes').textContent = categorySet.size || '--';

            // Build cards
            grid.innerHTML = '';
            allCards = [];

            sorted.forEach(function (brand) {
                var id = (brand.id || brand.nombre || '').toLowerCase();
                var name = brand.nombre || capitalize(id);
                var count = countMap[id] || 0;
                var logo = brand.logo || 'multimedia/Logos/' + capitalize(id) + '.webp';
                if (logo.endsWith('.png')) logo = logo.replace(/\.png$/i, '.webp');
                var fallbackLogo = logo.replace(/\.webp$/i, '.png');

                var card = document.createElement('a');
                card.href = 'marca.html?marca=' + encodeURIComponent(id);
                card.className = 'marca-card';
                card.innerHTML =
                    (count > 0 ? '<span class="marca-card-badge">' + count + '</span>' : '') +
                    '<img src="' + logo + '" alt="' + name + '" class="marca-card-logo" loading="lazy"' +
                    ' onerror="this.src=\'' + fallbackLogo + '\';this.onerror=null;">' +
                    '<span class="marca-card-name">' + name + '</span>' +
                    '<span class="marca-card-count">' + (count > 0 ? count + (count === 1 ? ' veh\u00edculo' : ' veh\u00edculos') : '0 veh\u00edculos') + '</span>';

                grid.appendChild(card);
                allCards.push({ el: card, name: name.toLowerCase() });
            });

            // If no brands loaded, show fallback
            if (!sorted.length) {
                showFallbackBrands();
            }
        }

        // Fallback: static brand list in case Firestore fails
        function showFallbackBrands() {
            var fallback = ['Chevrolet','Renault','Nissan','Kia','Mazda','Toyota','Hyundai','Ford',
                            'Honda','Suzuki','Volkswagen','BMW','Audi','Mitsubishi','Peugeot','Fiat','Jeep','Citro\u00ebn'];
            grid.innerHTML = '';
            allCards = [];
            fallback.forEach(function (name) {
                var id = name.toLowerCase().replace(/\u00eb/g,'e');
                var card = document.createElement('a');
                card.href = 'marca.html?marca=' + id;
                card.className = 'marca-card';
                card.innerHTML =
                    '<img src="multimedia/Logos/' + name.replace(/\u00eb/,'e') + '.webp" alt="' + name + '" class="marca-card-logo" loading="lazy"' +
                    ' onerror="this.src=\'multimedia/Logos/' + name.replace(/\u00eb/,'e') + '.png\';this.onerror=null;">' +
                    '<span class="marca-card-name">' + name + '</span>' +
                    '<span class="marca-card-count">Cargando...</span>';
                grid.appendChild(card);
                allCards.push({ el: card, name: name.toLowerCase() });
            });
            document.getElementById('statBrands').textContent = fallback.length;
        }

        // Search / filter
        searchInput.addEventListener('input', function () {
            var q = this.value.trim().toLowerCase();
            var visible = 0;
            allCards.forEach(function (c) {
                var match = !q || c.name.indexOf(q) !== -1;
                c.el.style.display = match ? '' : 'none';
                if (match) visible++;
            });
            // Show empty state if no matches
            var empty = document.getElementById('marcasEmpty');
            if (visible === 0 && q) {
                if (!empty) {
                    empty = document.createElement('div');
                    empty.id = 'marcasEmpty';
                    empty.className = 'marcas-empty';
                    empty.innerHTML = '<svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/><line x1="8" y1="11" x2="14" y2="11"/></svg>' +
                        '<p>No se encontraron marcas para "<strong>' + q.replace(/</g,'&lt;') + '</strong>"</p>';
                    grid.parentNode.appendChild(empty);
                }
            } else if (empty) {
                empty.remove();
            }
        });

        // Init + real-time updates
        waitForDB(function () {
            renderBrands();
            // Start real-time listeners so counts update live
            if (typeof vehicleDB !== 'undefined') {
                vehicleDB.startRealtime();
                vehicleDB.onChange(function (changeType) {
                    if (changeType === 'vehicles' || changeType === 'brands') {
                        renderBrands();
                    }
                });
            }
        });
    })();
    </script>
</body>
</html>
