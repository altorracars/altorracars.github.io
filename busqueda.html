    <style>
        .toggle-filters-btn {
            width: 100%;
            max-width: 300px;
            margin: 0 auto 20px;
            padding: 16px 24px;
            background: linear-gradient(135deg, #b89658 0%, #916652 100%);
            border: none;
            border-radius: 12px;
            color: white;
            font-size: 1.05rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            box-shadow: 0 4px 15px rgba(184, 150, 88, 0.3);
        }
        .toggle-filters-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(184, 150, 88, 0.4);
        }
        .toggle-filters-btn .filter-icon {
            font-size: 1.3rem;
        }
        .toggle-filters-btn .filter-arrow {
            margin-left: auto;
            transition: transform 0.3s ease;
        }
        .advanced-search-form.collapsed {
            max-height: 0;
            overflow: hidden;
            opacity: 0;
            transform: translateY(-10px);
            transition: max-height 0.4s ease, opacity 0.3s ease, transform 0.3s ease;
        }
        .advanced-search-form {
            max-height: 2000px;
            opacity: 1;
            transform: translateY(0);
            transition: max-height 0.4s ease, opacity 0.3s ease, transform 0.3s ease;
        }
        .search-term-banner {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
            padding: 0.75rem 1.25rem;
            margin-bottom: 1.25rem;
            background: rgba(212,175,55,0.08);
            border: 1px solid rgba(212,175,55,0.2);
            border-radius: 10px;
            color: rgba(255,255,255,0.7);
            font-size: 0.95rem;
        }
        .search-term-banner strong { color: #d4af37; }
        .search-term-clear {
            background: none;
            border: none;
            color: rgba(255,255,255,0.4);
            font-size: 1.3rem;
            cursor: pointer;
            padding: 0 0.25rem;
            line-height: 1;
            transition: color 0.2s;
        }
        .search-term-clear:hover { color: #d4af37; }
        @media (max-width: 768px) {
            .toggle-filters-btn {
                max-width: 100%;
            }
        }
    </style>

    <!-- Comparador — deferred to idle. Cards render fine without it
         (render.js uses defensive typeof check); user-triggered actions
         only fire after the script loads. -->
    <script>
    (function () {
        function loadComparador() {
            if (window._comparadorLoaded) return;
            window._comparadorLoaded = true;
            var s = document.createElement('script');
            s.src = 'js/comparador.js';
            s.async = false;
            document.body.appendChild(s);
        }
        if ('requestIdleCallback' in window) {
            requestIdleCallback(loadComparador, { timeout: 3000 });
        } else if (document.readyState === 'complete') {
            setTimeout(loadComparador, 1500);
        } else {
            window.addEventListener('load', function () {
                setTimeout(loadComparador, 1500);
            });
        }
    })();
    </script>
    <script src="js/filtros-avanzados.js" defer></script>
    <script>
        let currentPage = 1;
        const itemsPerPage = 12;
        let currentFilters = {};
        let currentSort = 'precio-asc';
        
        async function performSearch() {
            showLoading('searchResults');
            await vehicleDB.load();
            let vehicles = vehicleDB.filter(currentFilters);
            vehicles = vehicleDB.sort(vehicles, currentSort);
            document.getElementById('resultsCount').textContent = vehicles.length;
            const start = (currentPage - 1) * itemsPerPage;
            const end = start + itemsPerPage;
            renderVehicles(vehicles.slice(start, end), 'searchResults');
            renderPagination(vehicles.length, currentPage, itemsPerPage, 'pagination');
        }
        
        window.goToPage = function(page) {
            currentPage = page;
            performSearch();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        };
        
        // Cargar filtros dinámicos desde Firestore
        async function loadDynamicFilters() {
            await vehicleDB.load();
            await DynamicLists.load();
            DynamicLists.populatePageFilters();
        }

        document.addEventListener('DOMContentLoaded', () => {
            // Leer término de búsqueda desde URL (ej. ?buscar=Toyota desde el hero)
            const buscarParam = new URLSearchParams(window.location.search).get('buscar');
            if (buscarParam) {
                currentFilters.search = buscarParam;
                // Show search term banner
                const banner = document.getElementById('searchTermBanner');
                const termText = document.getElementById('searchTermText');
                if (banner && termText) {
                    termText.textContent = buscarParam;
                    banner.style.display = 'flex';
                }
            }

            // Clear search term button
            document.getElementById('clearSearchTerm')?.addEventListener('click', () => {
                delete currentFilters.search;
                const banner = document.getElementById('searchTermBanner');
                if (banner) banner.style.display = 'none';
                // Update URL to remove buscar param
                const url = new URL(window.location);
                url.searchParams.delete('buscar');
                window.history.replaceState({}, '', url);
                currentPage = 1;
                performSearch();
            });

            loadDynamicFilters();

            // Toggle filters button
            const toggleBtn = document.getElementById('toggleFilters');
            const form = document.getElementById('advancedSearchForm');
            if (toggleBtn && form) {
                toggleBtn.addEventListener('click', () => {
                    form.classList.toggle('collapsed');
                    const isCollapsed = form.classList.contains('collapsed');
                    toggleBtn.querySelector('.filter-text').textContent = isCollapsed ? 'Mostrar filtros' : 'Ocultar filtros';
                    toggleBtn.querySelector('.filter-arrow').textContent = isCollapsed ? '▼' : '▲';
                });
            }

            document.getElementById('advancedSearchForm')?.addEventListener('submit', (e) => {
                e.preventDefault();
                const formData = new FormData(e.target);
                // Preserve URL search term when applying filters
                const savedSearch = currentFilters.search;
                currentFilters = {};
                if (savedSearch) currentFilters.search = savedSearch;
                formData.forEach((value, key) => {
                    if (value) currentFilters[key] = value;
                });
                currentPage = 1;
                performSearch();
            });

            document.getElementById('clearSearch')?.addEventListener('click', () => {
                document.getElementById('advancedSearchForm').reset();
                currentFilters = {};
                currentPage = 1;
                performSearch();
            });

            document.getElementById('sortBy')?.addEventListener('change', (e) => {
                currentSort = e.target.value;
                performSearch();
            });

            // Integrar con filtros avanzados (sliders)
            document.addEventListener('advancedFiltersChanged', (e) => {
                const sliderValues = e.detail;
                Object.assign(currentFilters, sliderValues);
                currentPage = 1;
                performSearch();
            });

            performSearch();

            // Save search button
            var saveBtn = document.getElementById('saveSearchBtn');
            if (saveBtn) saveBtn.addEventListener('click', function() {
                if (!window.auth || !window.auth.currentUser || window.auth.currentUser.isAnonymous) {
                    if (window.AltorraAuth) window.AltorraAuth.open('login');
                    if (typeof toast !== 'undefined' && toast.info) toast.info('Inicia sesion para guardar busquedas.');
                    return;
                }
                var uid = window.auth.currentUser.uid;
                var filtros = Object.assign({}, currentFilters);
                var parts = [];
                if (filtros.marca) parts.push(filtros.marca);
                if (filtros.tipo) parts.push(filtros.tipo);
                if (filtros.categoria) parts.push(filtros.categoria);
                var nombre = parts.length > 0 ? parts.join(' - ') : 'Busqueda general';
                saveBtn.disabled = true;
                saveBtn.textContent = 'Guardando...';
                window.db.collection('clientes').doc(uid)
                    .collection('busquedasGuardadas').add({
                        nombre: nombre,
                        filtros: filtros,
                        alertas: true,
                        creadoEn: firebase.firestore.FieldValue.serverTimestamp()
                    }).then(function() {
                        if (typeof toast !== 'undefined' && toast.success) toast.success('Busqueda guardada con alertas de precio activadas.');
                        saveBtn.textContent = '\u2713 Guardada';
                        setTimeout(function() {
                            saveBtn.disabled = false;
                            saveBtn.textContent = '\u2605 Guardar busqueda';
                        }, 2000);
                    }).catch(function(err) {
                        console.warn('[Search] Error saving:', err);
                        if (typeof toast !== 'undefined' && toast.error) toast.error('Error al guardar.');
                        saveBtn.disabled = false;
                        saveBtn.textContent = '\u2605 Guardar busqueda';
                    });
            });
        });
    </script>
