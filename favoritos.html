<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="/multimedia/logo-placeholder.png">
    <link rel="apple-touch-icon" href="/multimedia/logo-placeholder.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <title>Favoritos | ALTORRA CARS</title>
    <link rel="canonical" href="https://altorracars.github.io/favoritos.html">
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/mobile-fixes.css">
    <link rel="stylesheet" href="css/vehicles-cards-fix.css">
    <link rel="stylesheet" href="css/sidebar-filters-fix.css">
    <link rel="stylesheet" href="css/footer-fixes.css">
    <link rel="stylesheet" href="css/toast-notifications.css">
    <link rel="stylesheet" href="css/comparador.css">
    <link rel="stylesheet" href="css/favorites-page.css">
    <link rel="stylesheet" href="css/favorites-empty-fullpage.css">
    <link rel="stylesheet" href="css/dark-theme.css">
    <link rel="stylesheet" href="css/performance-fixes.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
    <!-- Page Loader — Critical Inline CSS (cross-browser) -->
    <style>
    #page-loader{position:fixed;top:0;left:0;right:0;bottom:0;background:#0d0d0d;z-index:99999;display:-webkit-box;display:-webkit-flex;display:-ms-flexbox;display:flex;-webkit-box-align:center;-webkit-align-items:center;-ms-flex-align:center;align-items:center;-webkit-box-pack:center;-webkit-justify-content:center;-ms-flex-pack:center;justify-content:center;-webkit-box-orient:vertical;-webkit-box-direction:normal;-webkit-flex-direction:column;-ms-flex-direction:column;flex-direction:column;gap:24px;-webkit-transition:opacity .5s cubic-bezier(.4,0,.2,1),visibility .5s cubic-bezier(.4,0,.2,1);transition:opacity .5s cubic-bezier(.4,0,.2,1),visibility .5s cubic-bezier(.4,0,.2,1);}
    #page-loader.pl-done{opacity:0;visibility:hidden;pointer-events:none;}
    .pl-logo{width:68px;height:68px;-o-object-fit:contain;object-fit:contain;-webkit-animation:plPulse 2s ease-in-out infinite;animation:plPulse 2s ease-in-out infinite;}
    .pl-ring{width:48px;height:48px;border:3px solid rgba(184,150,88,.18);border-top-color:#b89658;border-radius:50%;-webkit-animation:plSpin .8s linear infinite;animation:plSpin .8s linear infinite;}
    @-webkit-keyframes plPulse{0%,100%{opacity:1;-webkit-transform:scale(1);transform:scale(1)}50%{opacity:.6;-webkit-transform:scale(.93);transform:scale(.93)}}
    @keyframes plPulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.6;transform:scale(.93)}}
    @-webkit-keyframes plSpin{to{-webkit-transform:rotate(360deg);transform:rotate(360deg)}}
    @keyframes plSpin{to{transform:rotate(360deg)}}
    </style>
    <link rel="stylesheet" href="css/page-loader.css">
</head>
<body>
    <!-- Page Loader -->
    <div id="page-loader" role="status" aria-label="Cargando ALTORRA CARS">
        <img src="/multimedia/logo-placeholder.png" class="pl-logo" alt="ALTORRA CARS" width="68" height="68" onerror="this.style.display='none'">
        <div class="pl-ring" aria-hidden="true"></div>
    </div>

    <div id="header-placeholder"></div>
    <!-- Header solo visible cuando hay favoritos -->
    <section class="page-header" id="favoritesHeader" style="display: none;">
        <div class="container">
            <div class="favorites-header-content">
                <div>
                    <h1 class="page-title">Mis Favoritos</h1>
                    <p class="page-subtitle">Vehículos que has guardado (<span id="favoritesCount">0</span>)</p>
                </div>
                <button id="clearAllBtn" class="btn-clear-all" style="display: none;">
                    🗑️ Eliminar todos
                </button>
            </div>
        </div>
    </section>
    <section class="favorites-section">
        <div class="container">
            <div class="vehicles-grid" id="favoritesGrid">
                <!-- Vehicles will be loaded here -->
            </div>
        </div>
    </section>
    <div id="footer-placeholder"></div>
    <script src="js/firebase-config.js" defer></script>
    <script src="js/favorites-manager.js" defer></script>
    <script src="js/toast.js" defer></script>
    <script src="js/components.js" defer></script>
    <script src="js/database.js" defer></script>
    <script src="js/render.js" defer></script>
    <script src="js/main.js" defer></script>
    <script src="js/comparador.js" defer></script>
    <script>
        let currentFavorites = [];
        let _favPageRendered = false;

        function showFavSkeleton() {
            const container = document.getElementById('favoritesGrid');
            const header = document.getElementById('favoritesHeader');
            header.style.display = 'none';
            container.innerHTML =
                '<div class="fav-loading" style="grid-column:1/-1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:80px 20px;gap:16px;">'
                + '<div style="width:48px;height:48px;border:3px solid rgba(184,150,88,.18);border-top-color:#b89658;border-radius:50%;animation:plSpin .8s linear infinite;"></div>'
                + '<p style="color:#999;font-size:0.95rem;">Cargando tus favoritos...</p>'
                + '</div>';
        }

        async function loadFavorites() {
            const fm = window.favoritesManager;
            if (!fm) return;

            // If no registered user, show empty state (favorites require login)
            if (!fm._uid) {
                // If auth hasn't initialized yet, keep skeleton; otherwise show empty
                if (window.auth && window.auth.currentUser !== undefined) {
                    // auth resolved: user is anonymous or null → no favorites
                    _favPageRendered = true;
                } else if (!_favPageRendered) {
                    showFavSkeleton();
                    return;
                }
            }

            // If Firestore hasn't loaded yet, show skeleton and wait for 'synced' event
            if (fm._uid && !fm._loaded) {
                if (!_favPageRendered) showFavSkeleton();
                return;
            }

            const favorites = fm.getAll();
            currentFavorites = favorites;

            const container = document.getElementById('favoritesGrid');
            const countSpan = document.getElementById('favoritesCount');
            const clearBtn = document.getElementById('clearAllBtn');
            const header = document.getElementById('favoritesHeader');

            countSpan.textContent = favorites.length;

            if (favorites.length > 0) {
                header.style.display = 'block';
                clearBtn.style.display = 'block';
            } else {
                header.style.display = 'none';
                clearBtn.style.display = 'none';
            }

            if (favorites.length === 0) {
                _favPageRendered = true;
                container.innerHTML = `
                    <div class="no-favorites">
                        <div class="no-favorites-icon">♡</div>
                        <h2>No tienes favoritos aún</h2>
                        <p>Explora nuestro catálogo y guarda los autos que te interesen</p>
                        <div class="no-favorites-actions">
                            <a href="busqueda.html" class="btn-catalog btn-catalog-primary">Ver Todos los Autos</a>
                        </div>
                    </div>
                `;
                return;
            }

            await vehicleDB.load();
            const favoriteVehicles = favorites
                .map(id => vehicleDB.getVehicleById(String(id)))
                .filter(v => v !== undefined && v !== null);

            if (favoriteVehicles.length === 0) {
                _favPageRendered = true;
                container.innerHTML = `
                    <div class="no-favorites">
                        <div class="no-favorites-icon">♡</div>
                        <h2>No se encontraron vehículos</h2>
                        <p>Los vehículos guardados ya no están disponibles</p>
                        <div class="no-favorites-actions">
                            <a href="busqueda.html" class="btn-catalog btn-catalog-primary">Ver Todos los Autos</a>
                        </div>
                    </div>
                `;
                return;
            }

            _favPageRendered = true;
            renderVehicles(favoriteVehicles, 'favoritesGrid', { attachListeners: false });
            attachFavoriteListenersWithReload();
        }

        function attachFavoriteListenersWithReload() {
            const favButtons = document.querySelectorAll('.favorite-btn');
            favButtons.forEach(button => {
                button.addEventListener('click', async (e) => {
                    e.preventDefault();
                    e.stopPropagation();

                    const vehicleId = button.getAttribute('data-id');
                    const card = button.closest('.vehicle-card');
                    card.style.transition = 'all 0.3s ease';
                    card.style.opacity = '0';
                    card.style.transform = 'scale(0.9)';

                    setTimeout(async () => {
                        if (window.favoritesManager) {
                            window.favoritesManager.remove(vehicleId);
                            window.favoritesManager.updateAllCounters();
                        }
                        await loadFavorites();

                        const count = window.favoritesManager ? window.favoritesManager.count() : 0;
                        if (window.notify) {
                            // Dismiss previous fav toast
                            if (window._lastFavToastId) {
                                window.notify.dismiss(window._lastFavToastId, true);
                            }
                            window._lastFavToastId = window.notify.info({
                                title: 'Quitado de favoritos',
                                message: count + ' ' + (count === 1 ? 'auto guardado' : 'autos guardados')
                            });
                        }
                    }, 300);
                });
            });
        }

        function clearAllFavorites() {
            if (currentFavorites.length === 0) return;
            if (!confirm('¿Estás seguro de eliminar todos los ' + currentFavorites.length + ' favoritos?')) return;

            const cards = document.querySelectorAll('.vehicle-card');
            cards.forEach((card, index) => {
                setTimeout(() => {
                    card.style.transition = 'all 0.3s ease';
                    card.style.opacity = '0';
                    card.style.transform = 'scale(0.9)';
                }, index * 50);
            });

            setTimeout(() => {
                if (window.favoritesManager) {
                    window.favoritesManager.clear();
                    window.favoritesManager.updateAllCounters();
                }
                loadFavorites();
                if (window.notify) {
                    window.notify.success({ title: '¡Listo!', message: 'Todos los favoritos han sido eliminados.' });
                }
            }, cards.length * 50 + 300);
        }

        // Re-render when FavoritesManager finishes loading or changes
        window.addEventListener('favoritesChanged', function (e) {
            if (!e.detail) return;
            var action = e.detail.action;
            if (action === 'synced' || action === 'added' || action === 'removed' || action === 'cleared') {
                loadFavorites();
            }
        });

        document.addEventListener('DOMContentLoaded', () => {
            showFavSkeleton();
            // Try immediately in case auth already resolved
            setTimeout(loadFavorites, 50);
            // Safety: if still showing skeleton after 4s, force render (prevents infinite loading)
            setTimeout(function() {
                if (!_favPageRendered) { _favPageRendered = true; loadFavorites(); }
            }, 4000);
            const clearBtn = document.getElementById('clearAllBtn');
            if (clearBtn) clearBtn.addEventListener('click', clearAllFavorites);
        });
    </script>

        <script src="js/page-loader.js"></script>
    <!-- Cache Manager -->
    <script src="js/cache-manager.js" defer></script>
</body>
</html>
