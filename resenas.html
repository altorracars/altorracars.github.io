<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    <meta name="description" content="Reseñas y testimonios de clientes satisfechos de ALTORRA CARS. Conoce las experiencias de quienes ya compraron su vehículo con nosotros.">
    <title>Reseñas de Clientes | ALTORRA CARS</title>
    <link rel="canonical" href="https://altorracars.github.io/resenas.html">

    <!-- Favicons -->
    <link rel="icon" type="image/png" href="/multimedia/logo-placeholder.png">
    <link rel="apple-touch-icon" href="/multimedia/logo-placeholder.png">

    <!-- Stylesheets -->
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/mobile-fixes.css">
    <link rel="stylesheet" href="css/footer-fixes.css">
    <link rel="stylesheet" href="css/reviews.css">
    <link rel="stylesheet" href="css/dark-theme.css">

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <style>
        /* ── Hero — synced with index/nosotros hero system ── */
        .page-hero {
            background: linear-gradient(135deg, #1d1b19 0%, #2a2420 50%, #1d1b19 100%);
            padding: calc(70px + 3rem) 20px 3rem;
            text-align: center;
            color: white;
            position: relative;
            overflow: hidden;
        }
        .page-hero::before {
            content: '';
            position: absolute;
            inset: 0;
            background:
                radial-gradient(ellipse at 25% 60%, rgba(212,175,55,0.07) 0%, transparent 55%),
                radial-gradient(ellipse at 75% 40%, rgba(184,150,88,0.05) 0%, transparent 55%);
        }

        .page-hero h1 {
            position: relative;
            z-index: 1;
            font-size: clamp(2rem, 4vw, 2.5rem);
            font-weight: 900;
            margin: 0 0 0.75rem;
            letter-spacing: -0.03em;
            line-height: 1.06;
        }

        .page-hero h1 .highlight {
            background: linear-gradient(135deg, #d4af37, #b89658);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .page-hero p {
            position: relative;
            z-index: 1;
            font-size: 1.05rem;
            color: rgba(255,255,255,0.6);
            margin: 0;
            line-height: 1.6;
        }

        .reviews-container {
            padding: 50px 20px 80px;
            background: #1a1a1a;
            min-height: 60vh;
        }

        /* Synced breakpoints 768/480 */
        @media (max-width: 768px) {
            .page-hero {
                padding: calc(70px + 2.5rem) 16px 2.5rem;
            }
            .page-hero h1 {
                font-size: clamp(1.5rem, 3.5vw, 1.85rem);
            }
        }
        @media (max-width: 480px) {
            .page-hero {
                padding: calc(70px + 2rem) 16px 2rem;
            }
            .page-hero h1 {
                font-size: clamp(1.3rem, 5vw, 1.5rem);
            }
        }
    </style>
    <!-- Page Loader — Critical Inline CSS (cross-browser) -->
    <style>
    #page-loader{position:fixed;top:0;left:0;right:0;bottom:0;background:#0d0d0d;z-index:99999;display:-webkit-box;display:-webkit-flex;display:-ms-flexbox;display:flex;-webkit-box-align:center;-webkit-align-items:center;-ms-flex-align:center;align-items:center;-webkit-box-pack:center;-webkit-justify-content:center;-ms-flex-pack:center;justify-content:center;-webkit-box-orient:vertical;-webkit-box-direction:normal;-webkit-flex-direction:column;-ms-flex-direction:column;flex-direction:column;gap:24px;-webkit-transition:opacity .5s cubic-bezier(.4,0,.2,1),visibility .5s cubic-bezier(.4,0,.2,1);transition:opacity .5s cubic-bezier(.4,0,.2,1),visibility .5s cubic-bezier(.4,0,.2,1);}
    #page-loader.pl-done{opacity:0;visibility:hidden;pointer-events:none;}
    .pl-logo{width:68px;height:68px;-o-object-fit:contain;object-fit:contain;-webkit-animation:plPulse 2s ease-in-out infinite;animation:plPulse 2s ease-in-out infinite;}
    .pl-ring{width:48px;height:48px;border:3px solid rgba(184,150,88,.18);border-top-color:#b89658;border-radius:50%;-webkit-animation:plSpin .8s linear infinite;animation:plSpin .8s linear infinite;}
    @-webkit-keyframes plPulse{0%,100%{opacity:1;-webkit-transform:scale(1);transform:scale(1)}50%{opacity:.6;-webkit-transform:scale(.93);transform:scale(.93)}}
    @keyframes plPulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.6;transform:scale(.93)}}
    @-webkit-keyframes plSpin{to{-webkit-transform:rotate(360deg);transform:rotate(360deg)}}
    @keyframes plSpin{to{transform:rotate(360deg)}}
    </style>
    <link rel="stylesheet" href="css/page-loader.css">
</head>
<body>
    <!-- Page Loader -->
    <div id="page-loader" role="status" aria-label="Cargando ALTORRA CARS">
        <img src="/multimedia/logo-placeholder.png" class="pl-logo" alt="ALTORRA CARS" width="68" height="68" onerror="this.style.display='none'">
        <div class="pl-ring" aria-hidden="true"></div>
    </div>

    <!-- Header Component -->
    <div id="header-placeholder"></div>

    <!-- Hero -->
    <section class="page-hero">
        <h1>Reseñas de <span class="highlight">Clientes</span></h1>
        <p>Conoce las experiencias de quienes ya forman parte de la familia ALTORRA</p>
    </section>

    <!-- Reviews Content -->
    <div class="reviews-container">
        <div id="reviewsContent">
            <!-- Se renderiza dinámicamente -->
        </div>
    </div>

    <!-- Footer Component -->
    <div id="footer-placeholder"></div>

    <!-- Scripts -->
    <script src="js/firebase-config.js"></script>
    <script src="js/components.js"></script>
    <script src="js/reviews.js"></script>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // Renderizar página de reseñas
            if (typeof reviewsSystem !== 'undefined') {
                reviewsSystem.renderFullReviewsPage('reviewsContent');
            }
        });
    </script>

        <script src="js/page-loader.js"></script>
    <!-- Cache Manager -->
    <script src="js/cache-manager.js"></script>
</body>
</html>
