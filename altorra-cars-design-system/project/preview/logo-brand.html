<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800;900&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Poppins',sans-serif;background:#0a0a0a;padding:28px 32px;display:flex;flex-direction:column;gap:20px;}
.title{color:#b89658;font-size:0.65rem;font-weight:700;letter-spacing:0.15em;text-transform:uppercase;opacity:0.6;}
.row{display:flex;align-items:center;gap:20px;flex-wrap:wrap;}
/* Logo area */
.logo-block{display:flex;align-items:center;gap:14px;}
.logo-block img{height:64px;}
.logo-text{font-size:1.2rem;font-weight:800;color:#d4af37;text-transform:uppercase;text-shadow:0 2px 15px rgba(212,175,55,0.5);letter-spacing:0.02em;}
/* Footer mark */
.footer-mark{display:flex;flex-direction:column;}
.mark-name{font-size:1.8rem;font-weight:900;color:#d4af37;letter-spacing:-0.02em;line-height:1;}
.mark-rule{width:100%;height:1px;background:rgba(212,175,55,0.4);margin:4px 0;}
.mark-sub{font-size:0.7rem;font-weight:700;letter-spacing:0.25em;color:#b89658;text-transform:uppercase;}
/* Wheel solo */
.wheel-solo{display:flex;flex-direction:column;align-items:center;gap:6px;}
.wheel-solo img{height:80px;}
.wheel-label{font-size:0.65rem;color:#9c9997;letter-spacing:0.1em;text-transform:uppercase;}
</style></head><body>
<div class="title">Logo — Primary (Header)</div>
<div class="logo-block">
  <img src="../assets/logo.png" alt="Altorra Cars" onerror="this.style.display='none'">
  <span class="logo-text">Altorra Cars</span>
</div>

<div class="title">Logo — Footer Identity Mark</div>
<div class="footer-mark">
  <span class="mark-name">ALTORRA</span>
  <span class="mark-rule"></span>
  <span class="mark-sub">CARS</span>
</div>

<div class="title">Logo — Wheel Icon (Isolated)</div>
<div class="row">
  <div class="wheel-solo">
    <img src="../assets/logo-wheel.png" alt="Altorra wheel">
    <div class="wheel-label">On dark</div>
  </div>
  <div class="wheel-solo" style="background:#fafafa;padding:12px;border-radius:12px;">
    <img src="../assets/logo-wheel.png" alt="Altorra wheel">
    <div class="wheel-label" style="color:#666;">On light</div>
  </div>
</div>
</body></html>
