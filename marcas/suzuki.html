    @keyframes plSpin{to{transform:rotate(360deg)}}
    </style>
    <link rel="stylesheet" href="css/page-loader.css">
    <script type="application/ld+json">{"@context":"https://schema.org","@type":"AutoDealer","name":"ALTORRA CARS - Suzuki","url":"https://altorracars.github.io/marcas/suzuki.html","brand":{"@type":"Brand","name":"Suzuki"},"description":"Vehículos Suzuki disponibles en ALTORRA CARS, Cartagena. 1 vehículo en inventario. Financiación disponible.","address":{"@type":"PostalAddress","addressLocality":"Cartagena","addressCountry":"CO"},"numberOfItems":1}</script>
</head>
<body>
    <!-- Page Loader -->
    <div id="page-loader" role="status" aria-label="Cargando ALTORRA CARS">
        <img src="/multimedia/logo-altorra-cars.webp" class="pl-logo" alt="ALTORRA CARS" width="68" height="68">
        <div class="pl-ring" aria-hidden="true"></div>
    </div>

    <div id="header-placeholder"></div>
    <noscript>
        <div style="max-width:1200px;margin:100px auto;padding:24px;font-family:sans-serif">
            <h1>Vehículos Suzuki en ALTORRA CARS</h1>
            <p>Vehículos Suzuki disponibles en ALTORRA CARS, Cartagena. 1 vehículo en inventario. Financiación disponible.</p>
            <ul style="list-style:none;padding:0;line-height:2">
                <li><a href="https://altorracars.github.io/vehiculos/suzuki-baleno-2022-10.html">Suzuki BALENO 2022</a></li>
            </ul>
            <p><a href="https://altorracars.github.io">Volver a ALTORRA CARS</a></p>
        </div>
    </noscript>
    <section class="brand-hero" id="brandHero" style="display:none;">
        <div class="brand-hero-overlay"></div>
        <img id="brandBanner" src="" alt="" class="brand-hero-bg">
    </section>
    <section class="page-header brand-header" id="brandHeader" style="display:none;">
        <div class="container">
            <h1 class="page-title" id="brandTitle">Cargando...</h1>
            <p class="page-subtitle" id="brandDesc"></p>
        </div>
    </section>
    <section class="catalog-section">
        <div class="container">
            <div class="catalog-layout">
                <button type="button" class="mobile-filters-toggle" id="mobileFiltersToggle">
                    <span class="toggle-icon">🔍 Filtros</span>
                    <span class="toggle-arrow">▼</span>
                </button>
                <aside class="filters-sidebar collapsed" id="filtersSidebar">
                    <div class="filters-header">
                        <h3>Filtros</h3>
                        <button id="clearFilters" class="btn-clear">Limpiar</button>
                    </div>
                    <form id="filtersForm" class="filters-form">
                        <div class="filter-group">
                            <label>Tipo</label>
                            <select name="tipo" id="tipoSelect" class="filter-select">
                                <option value="">Todos</option>
                            </select>
                        </div>
                        <div class="filter-group">
                            <label>Precio</label>
                            <div class="filter-inputs">
                                <input type="number" name="precioMin" placeholder="Mínimo" class="filter-input">
                                <span>-</span>
                                <input type="number" name="precioMax" placeholder="Máximo" class="filter-input">
                            </div>
                        </div>
                        <div class="filter-group">
                            <label>Categoría</label>
                            <select name="categoria" id="categoriaSelect" class="filter-select">
                                <option value="">Todas</option>
                            </select>
                        </div>
                        <div class="filter-group">
                            <label>Transmisión</label>
                            <select name="transmision" id="transmisionSelect" class="filter-select">
                                <option value="">Todas</option>
                            </select>
                        </div>
                        <div class="filter-group">
                            <label>Combustible</label>
                            <select name="combustible" id="combustibleSelect" class="filter-select">
                                <option value="">Todos</option>
                            </select>
                        </div>
                        <div class="filter-group">
                            <label>Año</label>
                            <div class="filter-inputs">
                                <input type="number" name="yearMin" placeholder="Desde" class="filter-input">
                                <span>-</span>
                                <input type="number" name="yearMax" placeholder="Hasta" class="filter-input">
                            </div>
                        </div>
                        <button type="submit" class="btn-apply-filters">Aplicar</button>
                    </form>
                </aside>
                <div class="catalog-main">
                    <div class="results-header">
                        <div class="results-info">
                            <p><span id="resultsCount">0</span> vehículos</p>
                        </div>
                        <div class="results-sort">
                            <label for="sortBy">Ordenar por:</label>
                            <select id="sortBy" class="sort-select">
                                <option value="precio-asc">Precio: Menor a Mayor</option>
                                <option value="precio-desc">Precio: Mayor a Menor</option>
                                <option value="year-desc">Año: Más Reciente</option>
                            </select>
                        </div>
                    </div>
                    <div class="vehicles-grid" id="vehiclesGrid"></div>
                    <div id="pagination"></div>
                </div>
            </div>
        </div>
    </section>
    <div id="footer-placeholder"></div>
    <script src="js/firebase-config.js"></script>
    <script src="js/favorites-manager.js"></script><script src="js/toast.js"></script>
    <script src="js/components.js"></script>
    <script src="js/database.js"></script>
    <script src="js/dynamic-lists.js"></script>
    <script src="js/render.js"></script>
    <script src="js/main.js"></script>
    <script src="js/comparador.js"></script>
    <script>window.PRERENDERED_BRAND_ID = "suzuki";</script>
    <script>
        const params = new URLSearchParams(window.location.search);
        const brandId = window.PRERENDERED_BRAND_ID || params.get('marca');
        let currentPage = 1;
        const itemsPerPage = 12;
        let currentFilters = { marca: brandId };
        let currentSort = 'precio-asc';
        
        async function loadVehicles() {
            if (!brandId) {
                window.location.href = 'busqueda.html';
                return;
            }

            // Show skeleton immediately so page feels instant
            showLoading('vehiclesGrid');

            // Load DB + filter lists in parallel — cuts wait time roughly in half
            await Promise.all([vehicleDB.load(), DynamicLists.load()]);
            DynamicLists.populatePageFilters();
            const brandInfo = vehicleDB.getBrandInfo(brandId);
            
            if (brandInfo) {
                document.getElementById('pageTitle').textContent = brandInfo.nombre + ' | ALTORRA CARS';

                // Intentar cargar banner
                const bannerPath = `multimedia/banner/b_${brandId}.png`;
                const brandHero = document.getElementById('brandHero');
                const brandHeader = document.getElementById('brandHeader');
                const bannerImg = document.getElementById('brandBanner');
                const titleEl = document.getElementById('brandTitle');
                const descEl = document.getElementById('brandDesc');

                // Verificar si existe el banner
                const img = new Image();
                img.onload = function() {
                    // Banner existe, mostrar hero section
                    bannerImg.src = bannerPath;
                    bannerImg.alt = brandInfo.nombre;

                    // Guardar posición de scroll actual
                    const currentScrollPos = window.pageYOffset || document.documentElement.scrollTop;

                    brandHero.style.display = 'block';
                    brandHeader.style.display = 'none';

                    // Restaurar posición de scroll para evitar saltos
                    window.scrollTo(0, currentScrollPos);
                };
                img.onerror = function() {
                    // Banner no existe, usar header normal
                    titleEl.textContent = brandInfo.nombre;
                    descEl.textContent = brandInfo.descripcion;
                    brandHero.style.display = 'none';
                    brandHeader.style.display = 'block';
                };
                img.src = bannerPath;
            } else {
                document.getElementById('brandTitle').textContent = capitalize(brandId);
                document.getElementById('brandHeader').style.display = 'block';
            }
            
            let vehicles = vehicleDB.filter(currentFilters);
            vehicles = vehicleDB.sort(vehicles, currentSort);
            document.getElementById('resultsCount').textContent = vehicles.length;
            const start = (currentPage - 1) * itemsPerPage;
            renderVehicles(vehicles.slice(start, start + itemsPerPage), 'vehiclesGrid');
            renderPagination(vehicles.length, currentPage, itemsPerPage, 'pagination');
        }
        
        window.goToPage = p => { currentPage = p; loadVehicles(); scrollTo(0, 0); };
        
        document.addEventListener('DOMContentLoaded', () => {
            // Mobile filter toggle
            const mobileToggle = document.getElementById('mobileFiltersToggle');
            const sidebar = document.getElementById('filtersSidebar');
            if (mobileToggle && sidebar) {
                mobileToggle.addEventListener('click', () => {
                    sidebar.classList.toggle('collapsed');
                    const isCollapsed = sidebar.classList.contains('collapsed');
                    mobileToggle.querySelector('.toggle-arrow').textContent = isCollapsed ? '▼' : '▲';
                });
            }

            document.getElementById('filtersForm')?.addEventListener('submit', e => {
                e.preventDefault();
                currentFilters = { marca: brandId };
                new FormData(e.target).forEach((v, k) => { if (v) currentFilters[k] = v; });
                currentPage = 1;
                loadVehicles();
            });
            document.getElementById('clearFilters')?.addEventListener('click', () => {
                document.getElementById('filtersForm').reset();
                currentFilters = { marca: brandId };
                loadVehicles();
            });
            document.getElementById('sortBy')?.addEventListener('change', e => {
                currentSort = e.target.value;
                loadVehicles();
            });
            loadVehicles();
        });
    </script>

        <script src="js/page-loader.js"></script>
    <!-- Cache Manager -->
    <script src="js/cache-manager.js"></script>
</body>
