<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <link rel="icon" type="image/png" href="/multimedia/logo-placeholder.png">
    <link rel="apple-touch-icon" href="/multimedia/logo-placeholder.png">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="robots" content="noindex, nofollow">
    <title>Mi Perfil | ALTORRA CARS</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/toast-notifications.css" media="print" onload="this.media='all'">
    <link rel="stylesheet" href="css/dark-theme.css">
    <link rel="stylesheet" href="css/performance-fixes.css">
    <link rel="stylesheet" href="css/perfil.css">
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
    <noscript><link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;500;600;700;800&display=swap" rel="stylesheet"></noscript>
    <style>
    #page-loader{position:fixed;top:0;left:0;right:0;bottom:0;background:#0d0d0d;z-index:99999;display:flex;align-items:center;justify-content:center;flex-direction:column;gap:24px;transition:opacity .5s,visibility .5s;}
    #page-loader.pl-done{opacity:0;visibility:hidden;pointer-events:none;}
    .pl-logo{width:68px;height:68px;object-fit:contain;animation:plPulse 2s ease-in-out infinite;}
    .pl-ring{width:48px;height:48px;border:3px solid rgba(184,150,88,.18);border-top-color:#b89658;border-radius:50%;animation:plSpin .8s linear infinite;}
    @keyframes plPulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.6;transform:scale(.93)}}
    @keyframes plSpin{to{transform:rotate(360deg)}}
    </style>
    <link rel="stylesheet" href="css/page-loader.css">

    <noscript>
            <link rel="stylesheet" href="css/toast-notifications.css">
    </noscript>
    <!-- Auth hint reader — synchronous, pre-paint. Eliminates FOUC of
         unauthenticated header buttons when the user is already logged in.
         Sets html.auth-authenticated or html.auth-guest based on the
         localStorage flag persisted by auth.js (updateHeaderAuthState).
         CSS in style.css uses these classes to hide/show login buttons. -->
    <script>
    (function () {
        try {
            var hint = localStorage.getItem('altorra_auth_hint');
            document.documentElement.classList.add(
                hint === 'authenticated' ? 'auth-authenticated' : 'auth-guest'
            );
        } catch (e) {
            document.documentElement.classList.add('auth-guest');
        }
    })();
    </script>
    <!-- Critical header CSS — inlined for first-paint stability.
         (1) Reserves 80px for the header so layout doesn't shift when
             components.js injects the fetched header HTML.
         (2) Hides .nav-actions until JS adds .hdr-ready (atomic reveal —
             prevents the sequential paint of favoritos→login→register→bell).
         (3) Auth hint rules duplicated here so they apply even before
             style.css finishes parsing (defense-in-depth).
         Apple/Amazon pattern: critical chrome CSS is always inline. -->
    <style>
    #header-placeholder{min-height:80px;display:block}
    header .nav-actions{opacity:0;visibility:hidden;transition:opacity .28s cubic-bezier(.22,1,.36,1);min-height:34px}
    header .nav-actions.hdr-ready{opacity:1;visibility:visible}
    html.auth-authenticated #btnLogin,html.auth-authenticated #btnRegister,html.auth-authenticated #mobBtnLogin,html.auth-authenticated #mobBtnRegister{display:none!important}
    html.auth-guest #headerUserArea{display:none!important}
    html.auth-authenticated #headerUserArea{min-width:36px;display:inline-flex;align-items:center}
    @media (prefers-reduced-motion:reduce){header .nav-actions{transition:none}}
    </style>
</head>
<body>
    <div id="page-loader" role="status" aria-label="Cargando">
        <img src="/multimedia/logo-placeholder.png" class="pl-logo" alt="ALTORRA CARS" width="68" height="68" onerror="this.style.display='none'">
        <div class="pl-ring" aria-hidden="true"></div>
    </div>

    <div id="header-placeholder"></div>

    <main class="profile-main">
        <!-- Mobile tabs (visible < 768px) -->
        <div class="pf-mobile-tabs" id="pfMobileTabs"></div>

        <div class="pf-layout">
            <!-- Sidebar (visible >= 768px) -->
            <aside class="pf-sidebar" id="pfSidebar">
                <div class="pf-sidebar-user">
                    <div class="pf-sidebar-avatar" id="pfSidebarAvatar">...</div>
                    <div>
                        <div class="pf-sidebar-name" id="pfSidebarName">Cargando</div>
                        <div class="pf-sidebar-email" id="pfSidebarEmail"></div>
                    </div>
                </div>
                <nav class="pf-nav-wrap" aria-label="Menu del perfil"></nav>
            </aside>

            <!-- Content area -->
            <div class="pf-content" id="pfContentArea">
                <!-- Populated by perfil.js -->
            </div>
        </div>
    </main>

    <script src="js/firebase-config.js"></script>
    <script src="js/components.js"></script>
    <script src="js/database.js"></script>
    <script src="js/favorites-manager.js"></script>
    <script src="js/favorites-watcher.js" defer></script>
    <script src="js/historial-visitas.js"></script>
    <script src="js/toast.js"></script>
    <script src="js/perfil.js"></script>
    <script src="js/page-loader.js"></script>
    <script src="js/cache-manager.js" defer></script>
</body>
</html>
