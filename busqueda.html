    <!-- Auth hint reader — synchronous, pre-paint. Eliminates FOUC of
         unauthenticated header buttons when the user is already logged in.
         Sets html.auth-authenticated or html.auth-guest based on the
         localStorage flag persisted by auth.js (updateHeaderAuthState).
         CSS in style.css uses these classes to hide/show login buttons. -->
    <script>
    (function () {
        try {
            var hint = localStorage.getItem('altorra_auth_hint');
            document.documentElement.classList.add(
                hint === 'authenticated' ? 'auth-authenticated' : 'auth-guest'
            );
        } catch (e) {
            document.documentElement.classList.add('auth-guest');
        }
    })();
    </script>
    <!-- Critical header CSS — inlined for first-paint stability.
         (1) Reserves 80px for the header so layout doesn't shift when
             components.js injects the fetched header HTML.
         (2) Hides .nav-actions until JS adds .hdr-ready (atomic reveal —
             prevents the sequential paint of favoritos→login→register→bell).
         (3) Auth hint rules duplicated here so they apply even before
             style.css finishes parsing (defense-in-depth).
         Apple/Amazon pattern: critical chrome CSS is always inline. -->
    <style>
    #header-placeholder{min-height:80px;display:block}
    header .nav-actions{opacity:0;visibility:hidden;transition:opacity .28s cubic-bezier(.22,1,.36,1);min-height:34px}
    header .nav-actions.hdr-ready{opacity:1;visibility:visible}
    html.auth-authenticated #btnLogin,html.auth-authenticated #btnRegister,html.auth-authenticated #mobBtnLogin,html.auth-authenticated #mobBtnRegister{display:none!important}
    html.auth-guest #headerUserArea{display:none!important}
    html.auth-authenticated #headerUserArea{min-width:36px;display:inline-flex;align-items:center}
    @media (prefers-reduced-motion:reduce){header .nav-actions{transition:none}}
    </style>

    <!-- Comparador — deferred to idle. Cards render fine without it
         (render.js uses defensive typeof check); user-triggered actions
         only fire after the script loads. -->
    <script>
    (function () {
        function loadComparador() {
            if (window._comparadorLoaded) return;
            window._comparadorLoaded = true;
            var s = document.createElement('script');
            s.src = 'js/public/comparador.js';
            s.async = false;
            document.body.appendChild(s);
        }
        if ('requestIdleCallback' in window) {
            requestIdleCallback(loadComparador, { timeout: 3000 });
        } else if (document.readyState === 'complete') {
            setTimeout(loadComparador, 1500);
        } else {
            window.addEventListener('load', function () {
                setTimeout(loadComparador, 1500);
            });
        }
    })();
    </script>
    <script src="js/public/filtros-avanzados.js" defer></script>
    <script>
        let currentPage = 1;
        const itemsPerPage = 12;
        let currentFilters = {};
        let currentSort = 'precio-asc';
        
        async function performSearch() {
            showLoading('searchResults');
            await vehicleDB.load();
            let vehicles = vehicleDB.filter(currentFilters);
            vehicles = vehicleDB.sort(vehicles, currentSort);
            document.getElementById('resultsCount').textContent = vehicles.length;
            const start = (currentPage - 1) * itemsPerPage;
            const end = start + itemsPerPage;
            renderVehicles(vehicles.slice(start, end), 'searchResults');
            renderPagination(vehicles.length, currentPage, itemsPerPage, 'pagination');
        }
        
        window.goToPage = function(page) {
            currentPage = page;
            performSearch();
            window.scrollTo({ top: 0, behavior: 'smooth' });
        };
        
        // Cargar filtros dinámicos desde Firestore
        async function loadDynamicFilters() {
            await vehicleDB.load();
            await DynamicLists.load();
            DynamicLists.populatePageFilters();
            applyUrlFilters();   // F-1 (bot ALTOR): deep-link DESPUÉS de poblar los <select>
            await performSearch();   // re-busca ya filtrado (opciones e inventario ya están listos)
        }

        // F-1 (bot ALTOR v2): aplica filtros que llegan por querystring al cargar.
        // Corre DESPUÉS de populatePageFilters (los <select> ya tienen <option>), con
        // currentFilters como FUENTE DE VERDAD del filtrado; el .value del select es solo
        // reflejo (tolerante si la opción no existe). Sin esto el deep-link del bot es inerte
        // y "Ver sedanes" seguía mostrando el catálogo completo (bug B1, reporte del dueño).
        function applyUrlFilters() {
            var q = new URLSearchParams(window.location.search);
            var CATS = ['suv', 'pickup', 'sedan', 'hatchback'];   // canónicas (inventory-search)
            var allowed = ['tipo', 'marca', 'categoria', 'transmision', 'combustible',
                           'precioMin', 'precioMax', 'yearMin', 'yearMax', 'kmMin', 'kmMax'];
            var applied = [];
            allowed.forEach(function (k) {
                var v = q.get(k);
                if (!v) return;
                if (k === 'categoria' && CATS.indexOf(v.toLowerCase()) === -1) return; // descarta basura
                currentFilters[k] = v;                       // fuente de verdad del filtrado
                try {                                        // reflejo en el control si existe
                    var el = document.querySelector('[name="' + k + '"]');
                    if (el) el.value = v;
                } catch (e) {}
                applied.push(k);
            });
            return applied.length > 0;   // el scroll a resultados lo hace loadDynamicFilters tras renderizar
        }

        document.addEventListener('DOMContentLoaded', () => {
            // Leer término de búsqueda desde URL (ej. ?buscar=Toyota desde el hero)
            const buscarParam = new URLSearchParams(window.location.search).get('buscar');
            if (buscarParam) {
                currentFilters.search = buscarParam;   // sin banner: el dueño lo quitó (tapaba las cards)
            }

            // Clear search term button
            document.getElementById('clearSearchTerm')?.addEventListener('click', () => {
                delete currentFilters.search;
                const banner = document.getElementById('searchTermBanner');
                if (banner) banner.style.display = 'none';
                // Update URL to remove buscar param
                const url = new URL(window.location);
                url.searchParams.delete('buscar');
                window.history.replaceState({}, '', url);
                currentPage = 1;
                performSearch();
            });

            loadDynamicFilters();

            // Toggle de filtros (solo móvil) — abre/cierra el sidebar izquierdo
            const mobileToggle = document.getElementById('mobileFiltersToggle');
            const sidebar = document.getElementById('filtersSidebar');
            if (mobileToggle && sidebar) {
                mobileToggle.addEventListener('click', () => {
                    sidebar.classList.toggle('collapsed');
                    const arrow = mobileToggle.querySelector('.toggle-arrow');
                    if (arrow) arrow.textContent = sidebar.classList.contains('collapsed') ? '▼' : '▲';
                });
            }

            document.getElementById('filtersForm')?.addEventListener('submit', (e) => {
                e.preventDefault();
                const formData = new FormData(e.target);
                // Preserve URL search term when applying filters
                const savedSearch = currentFilters.search;
                currentFilters = {};
                if (savedSearch) currentFilters.search = savedSearch;
                formData.forEach((value, key) => {
                    if (value) currentFilters[key] = value;
                });
                currentPage = 1;
                performSearch();
            });

            document.getElementById('clearSearch')?.addEventListener('click', () => {
                document.getElementById('filtersForm').reset();
                currentFilters = {};
                currentPage = 1;
                performSearch();
            });

            document.getElementById('sortBy')?.addEventListener('change', (e) => {
                currentSort = e.target.value;
                performSearch();
            });

            // Integrar con filtros avanzados (sliders)
            document.addEventListener('advancedFiltersChanged', (e) => {
                const sliderValues = e.detail;
                Object.assign(currentFilters, sliderValues);
                currentPage = 1;
                performSearch();
            });

            performSearch();

            // Save search button
            var saveBtn = document.getElementById('saveSearchBtn');
            if (saveBtn) saveBtn.addEventListener('click', function() {
                if (!window.auth || !window.auth.currentUser || window.auth.currentUser.isAnonymous) {
                    if (window.AltorraAuth) window.AltorraAuth.open('login');
                    if (typeof toast !== 'undefined' && toast.info) toast.info('Inicia sesion para guardar busquedas.');
                    return;
                }
                var uid = window.auth.currentUser.uid;
                var filtros = Object.assign({}, currentFilters);
                var parts = [];
                if (filtros.marca) parts.push(filtros.marca);
                if (filtros.tipo) parts.push(filtros.tipo);
                if (filtros.categoria) parts.push(filtros.categoria);
                var nombre = parts.length > 0 ? parts.join(' - ') : 'Busqueda general';
                saveBtn.disabled = true;
                saveBtn.textContent = 'Guardando...';
                window.db.collection('clientes').doc(uid)
                    .collection('busquedasGuardadas').add({
                        nombre: nombre,
                        filtros: filtros,
                        alertas: true,
                        creadoEn: firebase.firestore.FieldValue.serverTimestamp()
                    }).then(function() {
                        if (typeof toast !== 'undefined' && toast.success) toast.success('Busqueda guardada con alertas de precio activadas.');
                        saveBtn.textContent = '\u2713 Guardada';
                        setTimeout(function() {
                            saveBtn.disabled = false;
                            saveBtn.textContent = '\u2605 Guardar busqueda';
                        }, 2000);
                    }).catch(function(err) {
                        console.warn('[Search] Error saving:', err);
                        if (typeof toast !== 'undefined' && toast.error) toast.error('Error al guardar.');
                        saveBtn.disabled = false;
                        saveBtn.textContent = '\u2605 Guardar busqueda';
                    });
            });
        });
    </script>
