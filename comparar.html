    <!-- SP-5.2.c.3 Paso 2 (ADR §135) — comparador cinematic. JS inline (abajo)
         renderiza slots A/B + picker inline + tabla diff + veredicto en #compare-root,
         usando vehicleComparator (compartido con el flotante) + vehicleDB. -->

    <script>
    // ════════════════════════════════════════════════════════════
    // COMPARADOR — página cinematic (port de redesign/Compare.jsx a vanilla)
    // Estado = vehicleComparator (compartido con el flotante, máx 2).
    // ════════════════════════════════════════════════════════════
    (function () {
        var root = document.getElementById('compare-root');
        if (!root) return;

        var pickerSide = null;   // 'a' | 'b' | null
        var pickerQuery = '';

        // ── Helpers ──────────────────────────────────────────
        function esc(s) {
            return String(s == null ? '' : s).replace(/[&<>"']/g, function (c) {
                return { '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c];
            });
        }
        function fmtPrice(n) { return '$' + Number(n || 0).toLocaleString('es-CO'); }
        function fmtKm(n) { return Number(n || 0).toLocaleString('es-CO') + ' km'; }
        function cap(s) { return s ? String(s).charAt(0).toUpperCase() + String(s).slice(1) : ''; }
        function priceOf(v) { return (v && (v.precioOferta || v.precio)) || 0; }
        var CAT_NAMES = { suv: 'SUV', sedan: 'Sedán', pickup: 'Pickup', hatchback: 'Hatchback', camioneta: 'Camioneta' };
        function catName(c) { return CAT_NAMES[c] || cap(c); }
        function detailUrl(v) {
            return (typeof getVehicleDetailUrl === 'function')
                ? getVehicleDetailUrl(v)
                : ('detalle-vehiculo.html?id=' + encodeURIComponent(v.id));
        }
        function getIds() {
            return (window.vehicleComparator ? vehicleComparator.getIds() : []).slice(0, 2);
        }
        function getVehicles() {
            return getIds().map(function (id) { return vehicleDB.getVehicleById(String(id)); }).filter(Boolean);
        }

        // ── Tabla de especificaciones ────────────────────────
        var GROUPS = [
            { title: 'Información General', rows: [
                { label: 'Año',        get: function (v) { return v.year; },          fmt: function (x) { return x || '—'; },                                       better: 'higher' },
                { label: 'Carrocería', get: function (v) { return catName(v.categoria); }, fmt: function (x) { return x || '—'; } },
                { label: 'Color',      get: function (v) { return v.color; },          fmt: function (x) { return x ? cap(x) : '—'; } },
                { label: 'Condición',  get: function (v) { return v.tipo; },           fmt: function (x) { return x === 'nuevo' ? '0 KM · Estreno' : (x ? 'Usado verificado' : '—'); } }
            ]},
            { title: 'Motor y rendimiento', rows: [
                { label: 'Cilindraje',  get: function (v) { return v.cilindraje; },  fmt: function (x) { return x || '—'; } },
                { label: 'Potencia',    get: function (v) { return v.potencia; },    fmt: function (x) { return x || '—'; } },
                { label: 'Combustible', get: function (v) { return v.combustible; }, fmt: function (x) { return x ? cap(x) : '—'; } },
                { label: 'Transmisión', get: function (v) { return v.transmision; }, fmt: function (x) { return x ? cap(x) : '—'; } },
                { label: 'Tracción',    get: function (v) { return v.traccion; },    fmt: function (x) { return x || '—'; } }
            ]},
            { title: 'Comercial', rows: [
                { label: 'Precio', get: function (v) { return priceOf(v); }, fmt: function (x) { return fmtPrice(x); }, better: 'lower' }
            ]},
            { title: 'Estado y documentación', rows: [
                { label: 'Kilometraje', get: function (v) { return v.kilometraje; }, fmt: function (x) { return (x || x === 0) ? fmtKm(x) : '—'; }, better: 'lower' },
                { label: 'Ubicación',   get: function (v) { return v.ubicacion; },   fmt: function (x) { return x || 'Cartagena'; } }
            ]}
        ];
        function toNum(x) {
            if (typeof x === 'number') return x;
            var n = parseFloat(String(x).replace(/[^\d.]/g, ''));
            return isNaN(n) ? null : n;
        }
        function diffWinner(row, a, b) {
            if (!a || !b || !row.better) return null;
            var na = toNum(row.get(a)), nb = toNum(row.get(b));
            if (na === null || nb === null || na === nb) return null;
            var aWins = row.better === 'lower' ? na < nb : na > nb;
            return aWins ? 'a' : 'b';
        }

        // ── Render parciales ─────────────────────────────────
        function heroHTML() {
            return '' +
                '<section class="cmp-hero">' +
                    '<a href="busqueda.html" class="cmp-back"><svg width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2"><path d="M15 18l-6-6 6-6"/></svg> Volver al catálogo</a>' +
                    '<span class="cin-eyebrow">Comparador · máx 2</span>' +
                    '<h1 class="cmp-h">Pon dos vehículos <span class="cmp-h-accent">lado a lado.</span></h1>' +
                    '<p class="cmp-sub">Las diferencias se resaltan automáticamente. Lo mejor de cada uno te lo señalamos en dorado.</p>' +
                '</section>';
        }
        function slotHTML(v, side) {
            if (!v) {
                return '' +
                    '<button type="button" class="cmp-slot is-empty" data-pick="' + side.toLowerCase() + '">' +
                        '<span class="cmp-slot-empty-icon"><svg width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.2"><path d="M12 5v14M5 12h14"/></svg></span>' +
                        '<span class="cmp-slot-empty-title">Agregar vehículo ' + side + '</span>' +
                        '<span class="cmp-slot-empty-sub">Elige cualquiera del catálogo</span>' +
                    '</button>';
            }
            var img = v.imagen || 'multimedia/vehicles/placeholder-car.jpg';
            return '' +
                '<div class="cmp-slot is-filled">' +
                    '<div class="cmp-slot-media" style="background-image:url(\'' + esc(img) + '\')">' +
                        '<button type="button" class="cmp-slot-remove" data-remove="' + esc(v.id) + '" aria-label="Quitar"><svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M6 6 18 18M6 18 18 6"/></svg></button>' +
                    '</div>' +
                    '<div class="cmp-slot-info">' +
                        '<span class="cmp-slot-brand">' + esc(cap(v.marca)) + '</span>' +
                        '<h3 class="cmp-slot-model">' + esc(v.modelo) + '</h3>' +
                        '<span class="cmp-slot-year">' + esc(v.year || '') + ' · ' + esc(catName(v.categoria)) + '</span>' +
                        '<span class="cmp-slot-price">' + fmtPrice(priceOf(v)) + '</span>' +
                        '<a href="' + esc(detailUrl(v)) + '" class="cmp-slot-link">Ver ficha <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M5 12h14M13 5l7 7-7 7"/></svg></a>' +
                    '</div>' +
                '</div>';
        }
        function slotsHTML(a, b) {
            return '' +
                '<section class="cmp-slots-section"><div class="cmp-slots">' +
                    slotHTML(a, 'A') +
                    '<span class="cmp-vs">VS</span>' +
                    slotHTML(b, 'B') +
                '</div></section>';
        }
        function tableHTML(a, b) {
            var groups = GROUPS.map(function (g) {
                var rows = g.rows.map(function (row) {
                    var winner = diffWinner(row, a, b);
                    var ca = a ? esc(row.fmt(row.get(a), a)) : '—';
                    var cb = b ? esc(row.fmt(row.get(b), b)) : '—';
                    var clsA = winner === 'a' ? 'is-win' : (a && b && winner === 'b' ? 'is-lose' : '');
                    var clsB = winner === 'b' ? 'is-win' : (a && b && winner === 'a' ? 'is-lose' : '');
                    return '<div class="cmp-row"><span class="cmp-row-label">' + esc(row.label) + '</span>' +
                        '<span class="cmp-row-cell ' + clsA + '">' + ca + '</span>' +
                        '<span class="cmp-row-cell ' + clsB + '">' + cb + '</span></div>';
                }).join('');
                return '<div class="cmp-group"><h3 class="cmp-group-title">' + esc(g.title) + '</h3><div class="cmp-rows">' + rows + '</div></div>';
            }).join('');
            return '<section class="cmp-table-section"><div class="cmp-table">' + groups + '</div>' + (a && b ? verdictHTML(a, b) : '') + '</section>';
        }
        function verdictHTML(a, b) {
            var pa = priceOf(a), pb = priceOf(b);
            var h;
            if (pa < pb) h = 'El <em>' + esc(cap(a.marca)) + ' ' + esc(a.modelo) + '</em> ofrece mejor precio.';
            else if (pa > pb) h = 'El <em>' + esc(cap(b.marca)) + ' ' + esc(b.modelo) + '</em> ofrece mejor precio.';
            else h = 'Ambos están al mismo precio — la decisión está en los detalles.';
            var msg = 'Hola Altorra, estoy comparando:\n• ' + cap(a.marca) + ' ' + a.modelo + ' ' + (a.year || '') + ' — ' + fmtPrice(pa) +
                '\n• ' + cap(b.marca) + ' ' + b.modelo + ' ' + (b.year || '') + ' — ' + fmtPrice(pb) +
                '\n\nNecesito asesoría para decidir.\nComparación: ' + window.location.href;
            var wa = 'https://wa.me/573235016747?text=' + encodeURIComponent(msg);
            return '' +
                '<div class="cmp-verdict">' +
                    '<span class="cin-eyebrow">Veredicto</span>' +
                    '<h3 class="cmp-verdict-h">' + h + '</h3>' +
                    '<div class="cmp-verdict-actions">' +
                        '<a href="' + esc(detailUrl(a)) + '" class="cmp-verdict-cta">Ver ' + esc(cap(a.marca)) + '</a>' +
                        '<a href="' + esc(detailUrl(b)) + '" class="cmp-verdict-cta">Ver ' + esc(cap(b.marca)) + '</a>' +
                        '<a href="' + esc(wa) + '" target="_blank" rel="noopener" class="cmp-verdict-cta cmp-verdict-cta--wa">' +
                            '<svg width="13" height="13" viewBox="0 0 24 24" fill="currentColor"><path d="M17.5 14.4c-.3-.2-1.7-.8-2-.9-.3-.1-.5-.2-.7.2-.2.3-.7.9-.9 1.1-.2.2-.3.2-.6.1-.3-.2-1.2-.5-2.4-1.5-.9-.8-1.4-1.7-1.6-2-.2-.3 0-.5.1-.6.1-.1.3-.4.4-.5.1-.2.2-.3.3-.5.1-.2 0-.4 0-.5-.1-.2-.7-1.6-.9-2.2-.2-.6-.5-.5-.7-.5h-.6c-.2 0-.5.1-.8.4-.3.3-1 .9-1 2.3 0 1.3 1 2.6 1.1 2.8.1.2 2 3 4.8 4.2 2 .9 2.4 1 3.2.9.5-.1 1.5-.6 1.7-1.2.2-.6.2-1.1.1-1.2-.1-.1-.3-.2-.6-.4zM12 2C6.5 2 2 6.5 2 12c0 1.8.5 3.6 1.4 5.1L2 22l5.1-1.4c1.5.8 3.2 1.3 5 1.3 5.5 0 10-4.5 10-10S17.5 2 12 2z"/></svg>' +
                            ' Consultar por WhatsApp' +
                        '</a>' +
                    '</div>' +
                '</div>';
        }
        function emptyHTML() {
            return '' +
                '<section class="cmp-empty-section"><div class="cmp-empty">' +
                    '<span class="cmp-empty-mark"><svg viewBox="0 0 100 100" fill="none"><rect x="20" y="20" width="25" height="60" stroke="currentColor" stroke-width="0.8" opacity="0.4" stroke-dasharray="3 4"/><rect x="55" y="20" width="25" height="60" stroke="currentColor" stroke-width="0.8" opacity="0.4" stroke-dasharray="3 4"/><path d="M48 50h4" stroke="currentColor" stroke-width="1" opacity="0.6"/></svg></span>' +
                    '<h3>Empieza eligiendo dos vehículos</h3>' +
                    '<p>Selecciónalos del catálogo o desde la ficha individual con el botón «Comparar».</p>' +
                    '<a href="busqueda.html" class="cmp-empty-cta">Explorar vehículos</a>' +
                '</div></section>';
        }
        function pickerListHTML() {
            var ids = getIds();
            var excludeId = pickerSide === 'a' ? ids[1] : ids[0];
            var q = pickerQuery.trim().toLowerCase();
            var all = (vehicleDB.vehicles || []).filter(function (v) {
                if (String(v.id) === String(excludeId)) return false;
                if (window.vehicleComparator && vehicleComparator.has(String(v.id))) return false;
                if (!q) return true;
                return ((v.marca || '') + ' ' + (v.modelo || '') + ' ' + (v.year || '')).toLowerCase().indexOf(q) !== -1;
            }).slice(0, 40);
            if (all.length === 0) return '<div class="cmp-picker-empty">Sin resultados</div>';
            return all.map(function (v) {
                var img = v.imagen || 'multimedia/vehicles/placeholder-car.jpg';
                return '<button type="button" class="cmp-picker-item" data-add="' + esc(v.id) + '">' +
                    '<span class="cmp-picker-thumb" style="background-image:url(\'' + esc(img) + '\')"></span>' +
                    '<span class="cmp-picker-info"><span class="cmp-picker-brand">' + esc(cap(v.marca)) + '</span><span class="cmp-picker-model">' + esc(v.modelo) + ' · ' + esc(v.year || '') + '</span></span>' +
                    '<span class="cmp-picker-price">' + fmtPrice(priceOf(v)) + '</span>' +
                '</button>';
            }).join('');
        }
        function pickerHTML() {
            return '' +
                '<div class="cmp-picker" id="cmpPicker" role="dialog" aria-label="Elegir vehículo">' +
                    '<div class="cmp-picker-panel">' +
                        '<div class="cmp-picker-head"><h3>Elige un vehículo</h3><button type="button" class="cmp-picker-close" id="cmpPickerClose" aria-label="Cerrar"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4"><path d="M6 6 18 18M6 18 18 6"/></svg></button></div>' +
                        '<div class="cmp-picker-search"><svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg><input type="text" id="cmpPickerInput" placeholder="Marca, modelo, año…" autocomplete="off"></div>' +
                        '<div class="cmp-picker-list" id="cmpPickerList">' + pickerListHTML() + '</div>' +
                    '</div>' +
                '</div>';
        }

        // ── Render principal ─────────────────────────────────
        function render() {
            var vs = getVehicles();
            var a = vs[0] || null, b = vs[1] || null;
            var html = heroHTML() + slotsHTML(a, b);
            if (a || b) html += tableHTML(a, b);
            else html += emptyHTML();
            root.innerHTML = html;
            if (pickerSide) {
                root.insertAdjacentHTML('beforeend', pickerHTML());
                var input = document.getElementById('cmpPickerInput');
                if (input) { input.value = pickerQuery; input.focus(); }
            }
        }

        // ── Eventos (delegación, sobrevive re-render) ────────
        root.addEventListener('click', function (e) {
            var pickBtn = e.target.closest('[data-pick]');
            if (pickBtn) { pickerSide = pickBtn.getAttribute('data-pick'); pickerQuery = ''; render(); return; }

            var removeBtn = e.target.closest('[data-remove]');
            if (removeBtn) {
                if (window.vehicleComparator) vehicleComparator.remove(removeBtn.getAttribute('data-remove'));
                render();
                return;
            }
            var addBtn = e.target.closest('[data-add]');
            if (addBtn) {
                if (window.vehicleComparator) vehicleComparator.add(addBtn.getAttribute('data-add'));
                pickerSide = null; pickerQuery = '';
                render();
                return;
            }
            if (e.target.closest('#cmpPickerClose') || e.target.id === 'cmpPicker') {
                pickerSide = null; render(); return;
            }
        });
        root.addEventListener('input', function (e) {
            if (e.target.id === 'cmpPickerInput') {
                pickerQuery = e.target.value;
                var listEl = document.getElementById('cmpPickerList');
                if (listEl) listEl.innerHTML = pickerListHTML();
            }
        });
        document.addEventListener('keydown', function (e) {
            if (e.key === 'Escape' && pickerSide) { pickerSide = null; render(); }
        });

        // ── Init ─────────────────────────────────────────────
        document.addEventListener('DOMContentLoaded', function () {
            var boot = function () {
                if (typeof vehicleDB === 'undefined') { setTimeout(boot, 60); return; }
                Promise.resolve(vehicleDB.load && vehicleDB.load()).then(render).catch(render);
                render();
            };
            boot();
        });
    })();
    </script>
