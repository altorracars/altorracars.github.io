<!DOCTYPE html><html lang="es"><head><meta charset="UTF-8">
<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Poppins',sans-serif;background:#0a0a0a;padding:24px;display:flex;flex-direction:column;gap:14px;}
.title{color:#b89658;font-size:0.65rem;font-weight:700;letter-spacing:0.15em;text-transform:uppercase;opacity:0.6;}
.row{display:flex;gap:12px;align-items:center;flex-wrap:wrap;}
.icon-item{display:flex;flex-direction:column;align-items:center;gap:6px;padding:12px;background:#1a1a1a;border-radius:8px;min-width:64px;}
.icon-label{font-size:0.6rem;color:#9c9997;text-align:center;}
.brand-logo{width:56px;height:40px;object-fit:contain;filter:brightness(0.95);}
.brand-item{display:flex;flex-direction:column;align-items:center;gap:6px;padding:10px 12px;background:#1a1a1a;border-radius:8px;}
.brand-name{font-size:0.62rem;color:#9c9997;}
